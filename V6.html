<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>问问大师 · 东方人生决策系统</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
button,input,select,textarea,.p2-act,.tab-item,.chip,.pf-card,.ai-sheet{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --glass-bg:var(--ac2);
  --glass-border:hsla(var(--accent-h),var(--accent-s),65%,0.18);
  --glass-blur:16px;
  --glass-shadow:0 4px 20px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.04);
  --glass-inner:inset 0 1px 1px rgba(255,255,255,0.45),inset 0 -1px 1px rgba(255,255,255,0.08);
  --accent:#c8a45a;--green:#7ab648;--red:#d4654a;--orange:#d4a04a;--yellow:#d4b85a;--teal:#8ab5c8;--purple:#9a7abf;
  --r:20px;--rs:14px;--rx:10px;
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC','Noto Sans SC',sans-serif;
  --serif:'Noto Serif SC','Songti SC','STSong',serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --m1:rgba(180,130,60,0.30);--m2:rgba(120,80,40,0.25);--m3:rgba(90,60,30,0.16);--m4:rgba(160,100,50,0.12);--m5:rgba(100,70,35,0.15);
  --bg1:#0d0b08;--bg2:#14120e;--bg3:#0f0d0a;
  --accent-h:38;--accent-s:55%;--accent-l:56%;
  --ac:hsl(var(--accent-h),var(--accent-s),var(--accent-l));
  --ac1:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.15);
  --ac2:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.08);
  --ac3:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.05);
  --ac4:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.35);
  --ac5:hsla(var(--accent-h),var(--accent-s),70%,0.50);
  --ac-glow:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.22);
  --ac-text:hsla(var(--accent-h),var(--accent-s),80%,0.9);
  --ac-dim:hsla(var(--accent-h),var(--accent-s),75%,0.45);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sf);background:#000;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;color:#fff;cursor:none}
@media(hover:none){body{cursor:auto}}/* 触屏设备恢复系统光标 */
::-webkit-scrollbar{width:0;height:0}

.mesh{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 15%,var(--m1) 0%,transparent 55%),radial-gradient(ellipse at 80% 75%,var(--m2) 0%,transparent 50%),radial-gradient(ellipse at 50% 40%,var(--m3) 0%,transparent 60%),radial-gradient(ellipse at 75% 15%,var(--m4) 0%,transparent 45%),radial-gradient(ellipse at 25% 85%,var(--m5) 0%,transparent 45%),linear-gradient(160deg,var(--bg1),var(--bg2),var(--bg3));background-size:200% 200%;animation:meshM 20s ease-in-out infinite alternate;transition:opacity .6s ease}
body.home .mesh{opacity:.35}/* 首页弱化原 mesh，凸显粒子 */

/* === 首页：粒子 canvas === */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.45;transition:opacity .8s ease}
body.home .particles{opacity:1}
body:not(.home) .mesh{opacity:.55}/* page2 时 mesh 也稍弱化，让粒子能透出 */

/* === 鼠标跟随光球 === */
.cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:9998;border-radius:50%;will-change:transform;mix-blend-mode:screen}
.cursor-dot{width:6px;height:6px;background:hsla(var(--accent-h),var(--accent-s),70%,0.95);box-shadow:0 0 12px hsla(var(--accent-h),var(--accent-s),60%,0.8),0 0 24px hsla(var(--accent-h),var(--accent-s),60%,0.4);transform:translate(-50%,-50%) translate3d(0,0,0);transition:width .2s,height .2s,opacity .3s}
.cursor-ring{width:36px;height:36px;border:1px solid hsla(var(--accent-h),var(--accent-s),65%,0.45);background:hsla(var(--accent-h),var(--accent-s),50%,0.04);transform:translate(-50%,-50%) translate3d(0,0,0);transition:width .25s cubic-bezier(.3,1.5,.5,1),height .25s cubic-bezier(.3,1.5,.5,1),border-color .2s,background .2s,opacity .3s}
.cursor-dot.hover{width:10px;height:10px}
.cursor-ring.hover{width:56px;height:56px;border-color:hsla(var(--accent-h),var(--accent-s),70%,0.75);background:hsla(var(--accent-h),var(--accent-s),55%,0.10)}
.cursor-ring.active{width:24px;height:24px}
.cursor-dot.hide,.cursor-ring.hide{opacity:0}
@media(hover:none){.cursor-dot,.cursor-ring{display:none}}
@keyframes meshM{0%{background-position:0% 0%}50%{background-position:100% 50%}100%{background-position:0% 100%}}

/* === 玻璃卡片：统一为「轻量柔光」风格（同首页 home-card）=== */
.glass{position:relative;background:linear-gradient(160deg,rgba(255,255,255,0.025),rgba(255,255,255,0.005));backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border:1px solid rgba(255,255,255,0.05);border-radius:22px;box-shadow:0 24px 60px -20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);overflow:hidden;transition:transform .5s cubic-bezier(.2,.8,.3,1.2),box-shadow .5s,border-color .4s;transform-style:preserve-3d;will-change:transform}
.glass::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle 260px at var(--mx,50%) var(--my,50%),hsla(var(--accent-h),var(--accent-s),70%,0.10),transparent 60%);opacity:0;transition:opacity .4s;pointer-events:none;z-index:1}
.glass:hover::before{opacity:1}
.glass:hover{border-color:hsla(var(--accent-h),var(--accent-s),65%,0.16);box-shadow:0 30px 80px -20px rgba(0,0,0,0.6),0 0 0 1px hsla(var(--accent-h),var(--accent-s),65%,0.08),inset 0 1px 0 rgba(255,255,255,0.10)}

.card-1{margin-bottom:16px;padding:24px 22px}
.card-2{margin-bottom:12px;padding:20px 20px}
.card-3{margin-bottom:12px;padding:16px 18px;border-radius:16px}

.page{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:transform 0.5s cubic-bezier(.32,.72,0,1),opacity 0.5s ease}
.page.hidden{pointer-events:none}
#page1.hidden{transform:translateX(-30%);opacity:0}
#page2{transform:translateX(100%);opacity:0}
#page2.active{transform:translateX(0);opacity:1}
#page2.hidden{transform:translateX(100%);opacity:0}

.p1-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%}
.p1-inner{width:100%;max-width:540px;margin:0 auto;padding:32px 24px;position:relative;z-index:2;display:flex;flex-direction:column;align-items:stretch;justify-content:center}
@media(max-height:680px){.p1-inner{padding:20px 24px}}

/* —— 入场动画 —— */
@keyframes tjFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes tjFadeIn{from{opacity:0}to{opacity:1}}
@keyframes tjGlow{0%,100%{text-shadow:0 0 30px hsla(var(--accent-h),var(--accent-s),65%,0.2)}50%{text-shadow:0 0 60px hsla(var(--accent-h),var(--accent-s),65%,0.45),0 0 100px hsla(var(--accent-h),var(--accent-s),65%,0.2)}}
body.home .anim-in{animation:tjFadeUp .9s cubic-bezier(.16,1,.3,1) backwards}
body.home .anim-in.d1{animation-delay:.1s}
body.home .anim-in.d2{animation-delay:.25s}
body.home .anim-in.d3{animation-delay:.42s}
body.home .anim-in.d4{animation-delay:.58s}
body.home .anim-in.d5{animation-delay:.72s}

/* —— Hero 已移除，仅保留 tjGlow 动画供他处复用 —— */
/* === 首页轻量卡片（替代 glass card-1，减少厚边）=== */
.home-card{position:relative;padding:24px 22px;margin-bottom:22px;background:linear-gradient(160deg,rgba(255,255,255,0.025),rgba(255,255,255,0.005));border-radius:22px;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);box-shadow:0 24px 60px -20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);overflow:hidden;transition:transform .5s cubic-bezier(.2,.8,.3,1.2),box-shadow .5s,border-color .4s;transform-style:preserve-3d;will-change:transform}
.home-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle 240px at var(--mx,50%) var(--my,50%),hsla(var(--accent-h),var(--accent-s),70%,0.12),transparent 60%);opacity:0;transition:opacity .4s;pointer-events:none}
.home-card:hover::before{opacity:1}
.home-card:hover{border-color:hsla(var(--accent-h),var(--accent-s),65%,0.18);box-shadow:0 30px 80px -20px rgba(0,0,0,0.6),0 0 0 1px hsla(var(--accent-h),var(--accent-s),65%,0.10),inset 0 1px 0 rgba(255,255,255,0.10)}

/* —— chips 入场错落动效 —— */
body.home .chip{animation:tjFadeUp .6s cubic-bezier(.16,1,.3,1) backwards;transition:all .25s,transform .15s}
body.home .chip:nth-child(1){animation-delay:.30s}
body.home .chip:nth-child(2){animation-delay:.36s}
body.home .chip:nth-child(3){animation-delay:.42s}
body.home .chip:nth-child(4){animation-delay:.48s}
body.home .chip:nth-child(5){animation-delay:.54s}
body.home .chip:nth-child(6){animation-delay:.60s}
body.home .chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px var(--ac3)}
body.home .chip:active{transform:translateY(0) scale(.96)}

/* —— CTA 升级：磁吸+涟漪 —— */
body.home .cta{background:linear-gradient(135deg,hsla(var(--accent-h),var(--accent-s),60%,0.22),hsla(var(--accent-h),var(--accent-s),50%,0.12));border:1px solid hsla(var(--accent-h),var(--accent-s),65%,0.35);box-shadow:0 8px 30px -8px hsla(var(--accent-h),var(--accent-s),50%,0.45),inset 0 1px 0 rgba(255,255,255,0.18);transition:all .3s cubic-bezier(.2,.8,.3,1.4),transform .15s}
body.home .cta:hover{background:linear-gradient(135deg,hsla(var(--accent-h),var(--accent-s),65%,0.34),hsla(var(--accent-h),var(--accent-s),55%,0.18));box-shadow:0 14px 40px -8px hsla(var(--accent-h),var(--accent-s),55%,0.6),inset 0 1px 0 rgba(255,255,255,0.25);transform:scale(1.04)}
.cta-ripple{position:absolute;border-radius:50%;transform:scale(0);background:rgba(255,255,255,0.4);pointer-events:none;animation:ripple .7s ease-out}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* —— 最近推演卡片：减弱边框 + hover 抬升 —— */
body.home .r-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.04);transition:all .3s cubic-bezier(.2,.8,.3,1)}
body.home .r-card:hover{background:rgba(255,255,255,0.06);border-color:hsla(var(--accent-h),var(--accent-s),65%,0.20);transform:translateY(-3px);box-shadow:0 12px 30px -8px rgba(0,0,0,0.4),0 0 0 1px hsla(var(--accent-h),var(--accent-s),65%,0.10)}
body.home .recent-grid{grid-template-columns:1fr}
body.home #recentZone,body.home #profileZone{animation:tjFadeUp .9s cubic-bezier(.16,1,.3,1) .4s backwards}

/* —— input/select 简化 —— */
body.home .fd input,body.home .fd select{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:all .25s}
body.home .fd input:hover,body.home .fd select:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.12)}
body.home .fd input:focus,body.home .fd select:focus{border-color:hsla(var(--accent-h),var(--accent-s),65%,0.5);background:rgba(255,255,255,0.07);box-shadow:0 0 0 4px hsla(var(--accent-h),var(--accent-s),65%,0.10)}

.chip-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{padding:8px 16px;border-radius:100px;font-size:.82em;color:rgba(255,245,220,0.65);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);transition:all .2s;font-family:var(--sf);letter-spacing:.3px;user-select:none}
.chip:hover{background:rgba(255,255,255,0.10)}
.chip.active{background:var(--ac1);color:var(--ac-text);border-color:hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.25);box-shadow:0 2px 8px var(--ac3)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.fd{display:flex;flex-direction:column;gap:6px}.fd.full{grid-column:1/-1}
.fd label{font-size:.72em;font-weight:500;color:rgba(255,255,255,0.45);letter-spacing:.5px}
.fd input,.fd select,.fd textarea{background:rgba(255,255,255,0.07);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.10);border-radius:var(--rx);padding:12px 14px;color:#fff;font-family:var(--sf);font-size:.9em;transition:all 0.25s;-webkit-appearance:none}
.fd input:focus,.fd select:focus,.fd textarea:focus{outline:none;border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.11);box-shadow:0 0 0 3px var(--ac-glow)}
.fd input::placeholder,.fd textarea::placeholder{color:rgba(255,255,255,0.22)}
.fd select option{background:#14120e;color:#fff}
.fd textarea{resize:vertical;min-height:68px;font-family:var(--sf)}

.cta-row{text-align:center;margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.cta{display:inline-flex;align-items:center;gap:8px;padding:16px 48px;border-radius:100px;border:none;font-family:var(--sf);font-size:1.06em;font-weight:600;color:#fff;cursor:pointer;letter-spacing:2px;background:rgba(255,255,255,0.18);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.28);box-shadow:0 4px 16px rgba(0,0,0,0.12),inset 0 1px 1px rgba(255,255,255,0.4);transition:all 0.3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.25),transparent);border-radius:100px 100px 0 0;pointer-events:none}
.cta:hover{background:rgba(255,255,255,0.28);transform:scale(1.03)}
.cta:active{transform:scale(0.97)}
.cta:disabled{opacity:0.4;cursor:not-allowed;transform:none}

.recent-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.recent-hd-title{font-size:.82em;color:rgba(255,245,220,0.35);letter-spacing:1.5px;font-weight:500}
.recent-grid{display:grid;grid-template-columns:1fr;gap:10px}
.r-card{position:relative;padding:18px 18px;border-radius:var(--rs);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .25s;overflow:hidden;display:flex;align-items:center;gap:14px}
.r-card:hover{background:rgba(255,255,255,0.08);transform:translateY(-1px);border-color:rgba(255,255,255,0.10)}
.r-ava{width:42px;height:42px;border-radius:50%;background:var(--ac2);display:flex;align-items:center;justify-content:center;font-size:1.2em;border:1px solid hsla(var(--accent-h),var(--accent-s),var(--accent-l),0.12)}
.r-info{flex:1;min-width:0}
.r-name{font-size:.92em;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:.72em;color:rgba(255,255,255,0.38);line-height:1.5}
.r-arrow{color:rgba(255,255,255,0.2);font-size:1.1em}

.p2-top{position:sticky;top:0;z-index:40;padding:12px 16px;display:flex;align-items:center;gap:12px;background:hsla(var(--accent-h),20%,4%,0.55);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-bottom:1px solid rgba(255,255,255,0.04)}
.p2-back{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);font-size:.78em;font-family:var(--sf);font-weight:500;cursor:pointer;transition:all .25s cubic-bezier(.2,.8,.3,1)}
.p2-back:hover{background:hsla(var(--accent-h),var(--accent-s),50%,0.10);border-color:hsla(var(--accent-h),var(--accent-s),65%,0.20);color:#fff;transform:translateX(-2px)}
.p2-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.p2-title{font-size:.95em;font-weight:600;letter-spacing:1px;flex:1;text-align:center}
.p2-actions{display:flex;gap:6px}
.p2-act{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;font-size:.85em;transition:all .25s cubic-bezier(.2,.8,.3,1.3)}
.p2-act:hover{background:hsla(var(--accent-h),var(--accent-s),50%,0.12);border-color:hsla(var(--accent-h),var(--accent-s),65%,0.25);transform:scale(1.08)}

.p2-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px}
.p2-inner{max-width:680px;margin:0 auto;padding:16px 16px 20px}

.tab-bar{position:fixed;z-index:60;display:none;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);padding:6px 7px;background:linear-gradient(180deg,hsla(var(--accent-h),25%,8%,0.88),hsla(var(--accent-h),20%,4%,0.92));backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:1px solid hsla(var(--accent-h),var(--accent-s),65%,0.22);border-radius:100px;box-shadow:0 20px 60px -10px rgba(0,0,0,0.75),0 8px 24px -6px hsla(var(--accent-h),var(--accent-s),30%,0.45),0 0 40px -8px hsla(var(--accent-h),var(--accent-s),60%,0.28),inset 0 1px 0 hsla(var(--accent-h),60%,90%,0.10),inset 0 -1px 0 rgba(0,0,0,0.3);max-width:calc(100vw - 28px);animation:tabBarIn .5s cubic-bezier(.2,.8,.3,1.3) backwards}
@keyframes tabBarIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.tab-bar.show{display:block;isolation:isolate}
/* 底栏下方双层呼吸光：宽光晕 + 中央亮线，不影响点击区域 */
.tab-bar::before{content:'';position:absolute;left:50%;bottom:-16px;width:76%;height:34px;border-radius:50%;background:radial-gradient(ellipse at center,hsla(var(--accent-h),var(--accent-s),64%,.72) 0%,hsla(var(--accent-h),var(--accent-s),54%,.30) 38%,transparent 72%);filter:blur(15px);opacity:.30;transform:translateX(-50%) scaleX(.78) scaleY(.68);transform-origin:center;pointer-events:none;z-index:-1;will-change:transform,opacity;animation:tabGlowBreath 3.4s ease-in-out infinite}
.tab-bar::after{content:'';position:absolute;left:22%;right:22%;bottom:-2px;height:2px;border-radius:100%;background:linear-gradient(90deg,transparent,hsla(var(--accent-h),var(--accent-s),80%,.92),transparent);box-shadow:0 0 10px hsla(var(--accent-h),var(--accent-s),65%,.70),0 0 24px hsla(var(--accent-h),var(--accent-s),55%,.42);opacity:.36;transform:scaleX(.72);pointer-events:none;z-index:0;will-change:transform,opacity;animation:tabLineBreath 3.4s ease-in-out infinite}
@keyframes tabGlowBreath{0%,100%{opacity:.24;transform:translateX(-50%) scaleX(.76) scaleY(.62)}50%{opacity:.78;transform:translateX(-50%) scaleX(1.08) scaleY(1)}}
@keyframes tabLineBreath{0%,100%{opacity:.28;transform:scaleX(.68)}50%{opacity:.92;transform:scaleX(1.08)}}
.tab-bar-inner{position:relative;z-index:1;display:flex;align-items:center;gap:2px}
@media(prefers-reduced-motion:reduce){.tab-bar::before,.tab-bar::after{animation:none;opacity:.42;transform:translateX(-50%) scale(1)}.tab-bar::after{transform:scaleX(1)}}
.tab-item{padding:9px 15px;border-radius:100px;cursor:pointer;transition:all 0.3s cubic-bezier(.4,0,.2,1);-webkit-tap-highlight-color:transparent;white-space:nowrap;position:relative;font-size:.76em;font-weight:600;letter-spacing:.8px;color:hsla(var(--accent-h),var(--accent-s),85%,0.72);font-family:var(--sf)}

/* 单术语解释卡：一句白话 → 当前命盘 → 专业补充 → 关联术语 */

@media(max-width:520px){.ai-title-row{padding-right:34px}.ai-msg.assistant{padding-right:6px}.ai-msg.user{padding-left:32px}.ai-msg-bubble{max-width:96%}.ai-body{min-height:190px}}

.ai-followups{margin-top:9px;padding-top:8px}.ai-followups-label{margin-bottom:5px}.ai-followup{padding:5px 9px;font-size:.86em}

/* 新测算未读提醒：进入建议页 / 打开顾问后分别消除 */
.notice-dot{display:none;width:7px;height:7px;border-radius:50%;background:#ff4d4f;box-shadow:0 0 0 2px rgba(255,77,79,.13),0 0 9px rgba(255,77,79,.72);pointer-events:none}
.notice-dot.show{display:inline-block;animation:noticePulse 1.9s ease-in-out infinite}
.nav-notice{position:absolute;top:5px;right:7px}
.entry-notice{position:relative;top:-1px;flex:0 0 7px;margin-left:-2px}

/* 卡片高亮闪烁（跳转后） */

/* ============================================================
   移动端体验增强 v1.0
   目标：可读字号、44px 触控区、安全区、键盘/底部弹层、低功耗动画
   ============================================================ */
:root{--touch-min:44px;--app-height:100dvh}
@media(max-width:700px){

  .page{height:var(--app-height,100dvh);min-height:0}
  .p1-scroll,.p2-scroll,.ai-body,.cdd,.mm-sheet,.modal-sheet{overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
  .p1-scroll,.p2-scroll{scrollbar-width:none}
  .p1-scroll::-webkit-scrollbar,.p2-scroll::-webkit-scrollbar{display:none}

  /* 首页与输入：避免 iOS 聚焦自动放大 */
  .p1-scroll{justify-content:flex-start;align-items:stretch}
  .p1-inner{max-width:none;padding:calc(16px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));margin:0}

  .form-grid{gap:14px}

  .fd input,.fd select,.fd textarea,.ai-input,.layoff-field select,#saveName{font-size:16px!important;min-height:48px;padding:12px 14px}
  .fd input[type="date"],.fd input[type="time"]{color-scheme:dark}
  .chip-wrap{gap:8px}.chip{min-height:44px;padding:10px 14px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex:1 1 calc(33.333% - 8px);text-align:center}
  .home-mode-row{padding:12px;gap:10px}.home-mode-copy b{font-size:13px}.home-mode-copy span{font-size:12px;line-height:1.5}
  .home-mode-switch{min-height:48px}.home-mode-switch .reading-mode-btn{min-height:42px}
  .switch-row{min-height:44px;font-size:13px}.switch{width:44px;height:26px;border-radius:13px}.switch::after{width:20px;height:20px;top:3px;left:3px}.switch.on::after{transform:translateX(18px)}
  .cta-row{margin-top:20px}.cta{width:100%;min-height:52px;justify-content:center;padding:14px 20px;font-size:16px;letter-spacing:1px}
  .recent-hd-title{font-size:13px}.r-card{min-height:68px;padding:13px 14px}.r-name{font-size:14px}.r-meta{font-size:12px;line-height:1.55}
  .cdd{max-height:min(42dvh,320px);border-radius:14px}.cdd .cg{font-size:11px;padding:8px 14px}.cdd .co{min-height:44px;padding:11px 14px;font-size:14px;align-items:center}

  /* 顶部：返回在左、模式切换真正居中，并适配刘海安全区 */
  .p2-top{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;min-height:calc(58px + env(safe-area-inset-top));padding:calc(7px + env(safe-area-inset-top)) 12px 7px;background:hsla(var(--accent-h),20%,4%,.86);backdrop-filter:blur(18px) saturate(145%);-webkit-backdrop-filter:blur(18px) saturate(145%)}
  .p2-top>.p2-back{grid-column:1;grid-row:1;justify-self:start;position:relative;min-width:64px;min-height:44px;padding:9px 11px;font-size:13px;z-index:2}
  .p2-top>.reading-mode-switch{grid-column:2;grid-row:1;position:static;left:auto;top:auto;transform:none;margin:0;z-index:1;min-height:46px}
  .p2-top>.reading-mode-switch .reading-mode-btn{min-width:72px;min-height:38px;padding:5px 8px}.reading-mode-btn span{font-size:13px}

  /* 主内容：更大字号、更紧凑边距、更轻渲染 */
  .p2-scroll{padding-bottom:calc(94px + env(safe-area-inset-bottom));scroll-padding-top:12px;scroll-padding-bottom:calc(104px + env(safe-area-inset-bottom))}
  .p2-inner{padding:12px 12px 24px;max-width:none}
  #page2 .glass{backdrop-filter:blur(13px) saturate(125%);-webkit-backdrop-filter:blur(13px) saturate(125%);will-change:auto;border-radius:17px}
  #page2 .glass.card-1,#page2 .glass.card-2{padding:16px!important;margin-bottom:12px}
  #page2 .glass.card-3{padding:14px!important}
  .card-hd{gap:9px;margin-bottom:12px;padding-bottom:10px;padding-right:42px;min-height:44px}.card-ic{width:38px;height:38px;flex:0 0 38px}.card-tt{font-size:15px;line-height:1.35}.card-st{font-size:12px;line-height:1.45;margin-top:3px}
  .card-toggle{width:44px;height:44px;right:-5px}.glass.collapsed{padding-bottom:15px!important}
  .at{font-size:14px;line-height:1.78;padding:5px 0}.at h4{font-size:15px;margin:15px 0 8px}.at p{margin-bottom:9px}
  .sstag,.risk-pill,.tg{font-size:12px;line-height:1.4}.risk-pill{min-height:40px;padding:8px 11px}

  /* 新手卡 */
  .bg-card{padding:17px 16px;margin-bottom:12px;border-radius:18px}.bg-kicker{font-size:12px}.bg-mode-note{font-size:11px}.bg-title{font-size:20px;line-height:1.42;margin-top:2px}.bg-lead{font-size:14px;line-height:1.7;max-width:100%}
  .bg-grid{gap:8px}.bg-item{padding:12px}.bg-item-label{font-size:12px}.bg-item-value{font-size:14px;line-height:1.65}.bg-next{padding:12px}.bg-next-label{font-size:12px}.bg-next-text{font-size:14px;line-height:1.65}
  .bg-actions{gap:8px}.bg-action{min-height:44px;padding:9px 14px;font-size:13px}.bg-pro-tip{font-size:12px;line-height:1.5;align-items:flex-start}.bg-pro-link{min-height:38px;font-size:12px}

  .wxr{gap:8px;padding:8px 0}.wxl{font-size:15px}.wxt{height:20px}.wxf{font-size:10px}.wxv{width:54px;font-size:12px}
  .portrait-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.port-item{padding:12px}.port-label{font-size:12px}.port-val{font-size:14px;line-height:1.62}
  .ig{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.ii{padding:12px}.il{font-size:12px}.iv{font-size:14px;line-height:1.5}
  .qr-card{padding:15px}.qr-badge{font-size:11px}.qr-title{font-size:14px}.qr-l{font-size:11px}.qr-v{font-size:14px}.qr-summary{font-size:13px}.qr-grid{gap:6px}.qr-act{min-height:42px;font-size:12px}
  .lym-item{min-height:94px;padding:12px 6px}.lym-name,.lym-jq{font-size:11px}.lym-gz{font-size:15px}.lym-ss{font-size:11px;padding:4px 7px}
  .ti{min-width:96px;min-height:100px;padding:14px 8px}.ta,.ty{font-size:11px}.tg2{font-size:15px}

  /* 年度与时间线：窄屏避免四列/三列挤压 */
  .y-hero{display:grid;grid-template-columns:1fr 1fr;gap:8px}.y-hero-item{padding:13px 8px}.y-hero-label{font-size:12px}.y-hero-stars{font-size:17px}.y-hero-score{font-size:13px}
  .tl-card{padding:13px}.tl-card-hd{grid-template-columns:auto 1fr;gap:10px}.tl-card-m{min-width:0}.tl-card-r{grid-column:1/-1;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:8px}.tl-theme{font-size:13px}.tl-stars{font-size:13px;white-space:nowrap}.tl-age-r{font-size:15px}.tl-year-r,.tl-stage,.tl-ss{font-size:11px}.tl-q-h{font-size:11px}.tl-q-b{font-size:13px}.tl-ms-pill,.tl-foot{font-size:11px}

/* ============================================================
   全局上下文工具 TJ —— 所有派生量的单一来源
   规则：任何"当前大运 / 当前流年 / 当前流月 / 年龄 / 十神 / 评分"
   必须经由 TJ.* 或 buildContext() 提供，禁止在下游函数中重复实现。
   ============================================================ */
const TJ={
  calcAge(by,bm,bd){
    if(!by)return 0;
    const now=new Date();
    const ty=now.getFullYear(),tm=now.getMonth()+1,td=now.getDate();
    let a=ty-by;
    if(bm&&bd&&(tm<bm||(tm===bm&&td<bd)))a--;
    return Math.max(0,a);
  },
  findDaYun(dy,age){
    if(!dy||!dy.ds||!dy.ds.length)return null;
    const ds=dy.ds;
    if(age<ds[0].as)return Object.assign({},ds[0],{_idx:0,_state:'before'});
    for(let i=0;i<ds.length;i++){
      if(age>=ds[i].as&&age<=ds[i].ae)return Object.assign({},ds[i],{_idx:i,_state:'current'});
    }
    return Object.assign({},ds[ds.length-1],{_idx:ds.length-1,_state:'after'});
  },
  findLiuNian(ln,year){
    if(!ln||!ln.length)return null;
    const y=year||CURR_YEAR;
    return ln.find(l=>l.y===y)||ln.find(l=>l.y>=y)||ln[ln.length-1];
  },
  findLiuYue(liuyue){
    if(!liuyue||!liuyue.length)return null;
    const now=new Date(),today=now.getTime();
    let best=null,bestDiff=Infinity;
    liuyue.forEach(lm=>{
      const mt=(lm.jq||'').match(/(\d+)月(\d+)日/);
      if(!mt)return;
      const dt=new Date(now.getFullYear(),parseInt(mt[1])-1,parseInt(mt[2]));
      const diff=today-dt.getTime();
      if(diff>=0&&diff<bestDiff){bestDiff=diff;best=lm;}
    });
    return best||liuyue[0];
  },
  ssOf(dg,g){return(dg&&g&&SS[dg])?SS[dg][g]:'';},
  isShunDaYun(b,gen){
    const yangGan=b.Y.gi%2===0;
    return(yangGan&&gen==='male')||(!yangGan&&gen!=='male');
  }
};

    if(str.strong){
      add(KE[dw],30,'扶抑：克身为用');
      add(SH[dw],25,'扶抑：泄秀为用');
      add(BK[dw],20,'扶抑：官杀制身');
    }else{
      add(BS[dw],30,'扶抑：印生身');
      add(dw,25,'扶抑：比劫帮身');
    }

    // (b) 调候：冬寒夏燥需调
    if(th){
      const primaryWx=GW[th.primary];
      const secondaryWx=GW[th.secondary];
      add(primaryWx,25,'调候：'+th.primary+'为主调候');
      add(secondaryWx,12,'调候：'+th.secondary+'为次调候');
    }

    // (c) 病药：找出命局最忌之神，取其克者
    const counts={};
    WX.forEach(w=>counts[w]=0);
    [b.Y.g,b.M.g,b.D.g,b.H.g].forEach(g=>counts[GW[g]]+=1);
    [b.Y.z,b.M.z,b.D.z,b.H.z].forEach(z=>{
      (ZC_W[z]||[]).forEach(([cg,w])=>counts[GW[cg]]+=w);
    });
    let maxW='木',maxV=0;
    WX.forEach(w=>{if(w!==dw&&counts[w]>maxV){maxV=counts[w];maxW=w}});
    if(maxV>=3.5){
      add(KE[maxW],15,'病药：制'+maxW+'之病');
    }

    // (d) 通关：若两强对峙
    WX.forEach(a=>WX.forEach(b2=>{
      if(KE[a]===b2&&counts[a]>=2.5&&counts[b2]>=2.5){
        const tg=SH[a]; // 通关者
        if(tg!==dw||!str.strong){
          add(tg,10,'通关：化'+a+'生'+b2);
        }
      }
    }));

    // 排序取主用神
    const sorted=Object.entries(cands).sort((a,b)=>b[1].score-a[1].score);
    if(!sorted.length)return{primary:SH[dw],secondary:KE[dw],candidates:{},reasons:['默认取食伤']};
    return{
      primary: sorted[0][0],
      secondary: sorted[1]?sorted[1][0]:null,
      candidates: cands,
      reasons: sorted[0][1].reasons
    };
  }

  /* ——— 4. 格局判定（子平真诠） ——— */
  function pattern(b, ss, str){
    const out={main:null, type:'正格', detail:[], grade:'B'};
    const mz=b.M.z, mw=ZW[mz];
    const dg=b.D.g, dw=GW[dg];
    const monthHidden=(ZC_W[mz]||[]).map(x=>x[0]);
    const allG=[b.Y.g,b.M.g,b.H.g];

    // ① 月令本气透干优先
    const benqi=monthHidden[0];
    let lord=null;
    if(benqi && benqi!==dg){
      // 是否透干
      if(allG.includes(benqi)) lord=benqi;
      else if(monthHidden[1] && allG.includes(monthHidden[1])) lord=monthHidden[1];
      else lord=benqi; // 不透取本气
    }

    if(lord){
      const ssName=SS[dg][lord];
      const map={
        '正官':'正官格','七杀':'七杀格','偏官':'七杀格',
        '正财':'正财格','偏财':'偏财格',
        '正印':'正印格','偏印':'偏印格',
        '食神':'食神格','伤官':'伤官格',
        '比肩':'建禄格','劫财':'月刃格'
      };
      out.main=map[ssName]||'杂气格';
      out.detail.push('月令'+mz+'透'+lord+'('+ssName+')');
    }

    // ② 变格判断：极旺/极弱时考虑从格、化气格
    if(str.extreme){
      if(str.score<=-60){
        // 身极弱 → 看是否成从
        const cnt={财:0,官:0,食:0};
        [b.Y.g,b.M.g,b.H.g,b.Y.z,b.M.z,b.D.z,b.H.z].forEach(c=>{
          const w=c.length>1?0:1;
          if(!w&&!ZC_W[c])return;
          const gan=GW[c]?c:null;
          if(gan){
            const w2=GW[gan];
            if(w2===KE[dw])cnt.财++;
            if(w2===BK[dw])cnt.官++;
            if(w2===SH[dw])cnt.食++;
          }
        });
        const max=Math.max(cnt.财,cnt.官,cnt.食);
        if(max>=3){
          out.type='从格';
          out.main=cnt.财===max?'从财格':cnt.官===max?'从官杀格':'从儿格';
          out.grade='A';
          out.detail.push('日主极弱，从'+(cnt.财===max?'财':cnt.官===max?'官杀':'食伤'));
        }
      } else if(str.score>=60){
        // 身极旺 → 专旺格
        out.type='从强格';
        out.main='专旺格('+dw+')';
        out.grade='A';
        out.detail.push('日主极旺，五行专一');
      }
    }

    // ③ 评级：是否破格
    if(out.main && out.type==='正格'){
      // 有相神护卫 → A；有破坏 → C
      out.grade='B';
    }

    return out;
  }

  /* ——— 5. 十神质量评估（有根/透出/被破） ——— */
  function tenGodQuality(b, ss){
    const dg=b.D.g;
    const allG=[b.Y.g,b.M.g,b.H.g];
    const allZ=[b.Y.z,b.M.z,b.D.z,b.H.z];
    const result={};
    const tenGods=['比肩','劫财','食神','伤官','偏财','正财','七杀','正官','偏印','正印'];

    tenGods.forEach(sg=>{
      let transparent=0, rooted=0, hidden=0;
      // 透干
      allG.forEach(g=>{ if(g && SS[dg][g]===sg) transparent++; });
      // 藏支
      allZ.forEach(z=>{
        (ZC_W[z]||[]).forEach(([cg,w])=>{
          if(SS[dg][cg]===sg) hidden+=w;
        });
      });
      rooted = transparent>0 && hidden>0.5;
      const quality = transparent*2 + hidden*1 + (rooted?1:0);
      result[sg]={transparent, hidden:Math.round(hidden*10)/10, rooted, quality:Math.round(quality*10)/10};
    });
    return result;
  }

  /* ——— 6. 干支互动：合、冲、刑、害、会 ——— */
  function interactions(b){
    const gz=[b.Y,b.M,b.D,b.H];
    const labels=['年','月','日','时'];
    const out={gan_he:[],zhi_he:[],zhi_chong:[],zhi_xing:[],zhi_hai:[],san_he:[],san_hui:[]};

    // 天干五合
    const ganHe={甲:'己',己:'甲',乙:'庚',庚:'乙',丙:'辛',辛:'丙',丁:'壬',壬:'丁',戊:'癸',癸:'戊'};
    for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){
      if(ganHe[gz[i].g]===gz[j].g) out.gan_he.push({a:labels[i]+gz[i].g,b:labels[j]+gz[j].g});
    }

    // 地支六合
    const zhiHe={子:'丑',丑:'子',寅:'亥',亥:'寅',卯:'戌',戌:'卯',辰:'酉',酉:'辰',巳:'申',申:'巳',午:'未',未:'午'};
    // 地支六冲
    const zhiChong={子:'午',午:'子',丑:'未',未:'丑',寅:'申',申:'寅',卯:'酉',酉:'卯',辰:'戌',戌:'辰',巳:'亥',亥:'巳'};
    // 地支相害
    const zhiHai={子:'未',未:'子',丑:'午',午:'丑',寅:'巳',巳:'寅',卯:'辰',辰:'卯',申:'亥',亥:'申',酉:'戌',戌:'酉'};
    // 地支相刑（不含三刑）
    const zhiXing=[['寅','巳'],['巳','申'],['申','寅'],['丑','戌'],['戌','未'],['未','丑'],['子','卯']];
    const ziXing=['辰','午','酉','亥']; // 自刑

    for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){
      const a=gz[i].z, c=gz[j].z;
      if(zhiHe[a]===c) out.zhi_he.push({a:labels[i]+a,b:labels[j]+c});
      if(zhiChong[a]===c) out.zhi_chong.push({a:labels[i]+a,b:labels[j]+c});
      if(zhiHai[a]===c) out.zhi_hai.push({a:labels[i]+a,b:labels[j]+c});
      if(zhiXing.some(p=>(p[0]===a&&p[1]===c)||(p[0]===c&&p[1]===a))) out.zhi_xing.push({a:labels[i]+a,b:labels[j]+c});
    }
    // 自刑
    const zhCount={};
    [b.Y.z,b.M.z,b.D.z,b.H.z].forEach(z=>{zhCount[z]=(zhCount[z]||0)+1});
    ziXing.forEach(z=>{ if(zhCount[z]>=2) out.zhi_xing.push({a:z,b:z,self:1}); });

    // 三合
    const sanHe=[['申','子','辰','水'],['亥','卯','未','木'],['寅','午','戌','火'],['巳','酉','丑','金']];
    sanHe.forEach(([a,b1,c,wx])=>{
      const has=[a,b1,c].filter(x=>zhCount[x]);
      if(has.length===3) out.san_he.push({zhi:a+b1+c,wx,full:1});
      else if(has.length===2) out.san_he.push({zhi:has.join(''),wx,full:0,half:1});
    });
    // 三会
    const sanHui=[['寅','卯','辰','木'],['巳','午','未','火'],['申','酉','戌','金'],['亥','子','丑','水']];
    sanHui.forEach(([a,b1,c,wx])=>{
      const has=[a,b1,c].filter(x=>zhCount[x]);
      if(has.length===3) out.san_hui.push({zhi:a+b1+c,wx});
    });

    return out;
  }

  /* ——— 7. 大运/流年高级评分（-100~100） ——— */
  function pillarScore(b, str, ys, gz){
    // gz: {g,z}
    if(!gz||!gz.g||!gz.z)return{score:0,reasons:[]};
    const dg=b.D.g, dw=str.dw;
    const ganWx=GW[gz.g], zhiWx=ZW[gz.z];
    let score=0;
    const reasons=[];

    // 天干层面
    if(ganWx===ys.primary){score+=30;reasons.push('天干为主用神'+ys.primary);}
    else if(ys.secondary&&ganWx===ys.secondary){score+=18;reasons.push('天干为次用神');}
    else if(str.strong){
      if(ganWx===KE[dw]){score+=15;reasons.push('财耗身（身旺喜财）');}
      else if(ganWx===SH[dw]){score+=12;reasons.push('食伤泄秀');}
      else if(ganWx===BK[dw]){score+=10;reasons.push('官杀制身');}
      else if(ganWx===BS[dw]){score-=15;reasons.push('印生身（身旺忌印）');}
      else if(ganWx===dw){score-=18;reasons.push('比劫帮身（身旺忌比劫）');}
    }else{
      if(ganWx===BS[dw]){score+=18;reasons.push('印星生身');}
      else if(ganWx===dw){score+=12;reasons.push('比劫帮身');}
      else if(ganWx===BK[dw]){score-=22;reasons.push('官杀克身（身弱大忌）');}
      else if(ganWx===KE[dw]){score-=12;reasons.push('财耗身（身弱难担）');}
      else if(ganWx===SH[dw]){score-=10;reasons.push('食伤泄气');}
    }

    // 地支层面（藏干加权）
    (ZC_W[gz.z]||[]).forEach(([cg,w])=>{
      const cw=GW[cg];
      if(cw===ys.primary)score+=15*w;
      else if(ys.secondary&&cw===ys.secondary)score+=8*w;
      else if(str.strong){
        if(cw===KE[dw])score+=8*w;
        else if(cw===dw)score-=10*w;
      }else{
        if(cw===BS[dw])score+=10*w;
        else if(cw===BK[dw])score-=12*w;
      }
    });

    // 刑冲（与日支、月支）
    const chongMap={子:'午',午:'子',丑:'未',未:'丑',寅:'申',申:'寅',卯:'酉',酉:'卯',辰:'戌',戌:'辰',巳:'亥',亥:'巳'};
    if(chongMap[gz.z]===b.D.z){score-=15;reasons.push('冲日支（变动·健康注意）');}
    if(chongMap[gz.z]===b.M.z){score-=10;reasons.push('冲月支（事业·家庭变化）');}
    if(gz.z===b.Y.z){score-=5;reasons.push('伏吟年支（本命之年）');}

    // 天克地冲（大忌）
    const ganChong={甲:'庚',乙:'辛',丙:'壬',丁:'癸',戊:'甲',己:'乙',庚:'丙',辛:'丁',壬:'戊',癸:'己'};
    if(ganChong[gz.g]===b.D.g && chongMap[gz.z]===b.D.z){
      score-=25;reasons.push('天克地冲日柱（重大变动）');
    }

    score=Math.max(-100,Math.min(100,Math.round(score)));
    return{score,reasons,label: score>=60?'大吉':score>=30?'吉':score>=10?'平稳偏吉':score>=-10?'平':score>=-30?'平稳偏凶':score>=-60?'凶':'大凶'};
  }

  /* ——— 8. 流年事件类型预测 ——— */
  function yearEvents(b, dg, str, gz, dyGz){
    if(!gz)return[];
    const events=[];
    const lnSS=SS[dg][gz.g]||'';
    const dySS=dyGz?(SS[dg][dyGz.g]||''):'';
    const chongMap={子:'午',午:'子',丑:'未',未:'丑',寅:'申',申:'寅',卯:'酉',酉:'卯',辰:'戌',戌:'辰',巳:'亥',亥:'巳'};
    const heMap={子:'丑',丑:'子',寅:'亥',亥:'寅',卯:'戌',戌:'卯',辰:'酉',酉:'辰',巳:'申',申:'巳',午:'未',未:'午'};

    // 十神事件
    if(lnSS==='正官'||lnSS==='七杀'){
      events.push({type:'事业',tag:str.strong?'升职/承担':'压力/受挫',weight:8});
    }
    if(lnSS==='正财'||lnSS==='偏财'){
      events.push({type:'财富',tag:str.strong?'进财机会':'破财/操劳',weight:8});
    }
    if(lnSS==='食神'||lnSS==='伤官'){
      events.push({type:'表达',tag:'创作/才华显露/子女',weight:6});
    }
    if(lnSS==='正印'||lnSS==='偏印'){
      events.push({type:'学习',tag:'进修/贵人/文书',weight:6});
    }
    if(lnSS==='比肩'||lnSS==='劫财'){
      events.push({type:'人际',tag:'合作/竞争/争财',weight:5});
    }

    // 配偶星动 → 感情事件
    const spouseStar = (b.D.gi%2===0)?'正财':'正官'; // 阳干以正财为妻，阴干以正官为夫
    if(lnSS===spouseStar || lnSS===(b.D.gi%2===0?'偏财':'七杀')){
      events.push({type:'感情',tag:'配偶星到位（婚恋机遇）',weight:9});
    }
    // 配偶宫(日支)被冲合
    if(chongMap[gz.z]===b.D.z) events.push({type:'感情',tag:'配偶宫被冲（关系动荡）',weight:7});
    if(heMap[gz.z]===b.D.z) events.push({type:'感情',tag:'配偶宫逢合（关系升温）',weight:7});

    // 岁运并临
    if(dyGz&&dyGz.g===gz.g&&dyGz.z===gz.z){
      events.push({type:'变动',tag:'岁运并临（人生关键节点·吉凶皆烈）',weight:10});
    }

    return events.sort((a,b)=>b.weight-a.weight);
  }

  /* ——— 9. 综合命局质量评级 ——— */
  function lifeGrade(str, yong, pat, ints){
    let g=60;
    // 中和最佳
    if(str.label==='中和'||str.label==='中和偏旺')g+=8;
    else if(str.extreme) g+= pat.type!=='正格' ? 12 : -8; // 成从/专旺则吉，半生不熟则凶
    // 用神有力
    if(yong.candidates[yong.primary]&&yong.candidates[yong.primary].score>=40)g+=8;
    // 格局成立
    if(pat.grade==='A')g+=12;
    else if(pat.grade==='B')g+=4;
    // 互动：合多吉，冲刑多凶（适度反而灵动）
    g += Math.min(ints.zhi_he.length*3,9);
    g += ints.san_he.filter(x=>x.full).length*5;
    g -= Math.min(ints.zhi_chong.length*4,12);
    g -= Math.min(ints.zhi_xing.length*3,9);

    g=Math.max(20,Math.min(95,Math.round(g)));
    const tier= g>=85?'上上':g>=75?'上中':g>=65?'中上':g>=55?'中中':g>=45?'中下':'下中';
    return{score:g, tier};
  }

  /* ——— 主入口：一次计算所有派生量 ——— */
  function compute(b, ss){
    const str = strength(b);
    const th  = tiaoHou(b);
    const yong= yongShen(b, str, th);
    const pat = pattern(b, ss, str);
    const tgq = tenGodQuality(b, ss);
    const ints= interactions(b);
    const life= lifeGrade(str, yong, pat, ints);
    return{
      strength:str,
      tiaoHou:th,
      yongShen:yong,
      pattern:pat,
      tenGodQuality:tgq,
      interactions:ints,
      lifeGrade:life,
      // 暴露评分函数供大运/流年调用
      pillarScore:(gz)=>pillarScore(b,str,yong,gz),
      yearEvents:(gz,dyGz)=>yearEvents(b,b.D.g,str,gz,dyGz)
    };
  }

  return{ compute, pillarScore, yearEvents, _const:{ZC_W,CS_W,TIAO_HOU,W_TABLE} };
})();

function calcYearScores(b,wx,ss,dySS,lnSS,tjx,cDy,cLn){
  const dg=b.D.g,dw=GW[dg];
  const lnBonus=lnSS.includes('官')?12:lnSS.includes('印')?10:lnSS.includes('财')?8:lnSS.includes('食')?6:lnSS.includes('比')?3:0;
  const dyBonus=dySS.includes('官')?8:dySS.includes('印')?7:dySS.includes('财')?6:dySS.includes('食')?5:0;
  const ysRatio=wx.c[wx.ys]/wx.t;
  const monthHelp=(ZW[b.M.z]===wx.ys||ZW[b.M.z]===wx.xs)?8:0;
  let career=52+ysRatio*35+lnBonus+dyBonus*0.5+monthHelp*0.3+(wx.st?3:0);
  let wealth=48+(wx.c[wx.KE[dw]]/wx.t)*30+(lnSS.includes('财')?15:0)+(dySS.includes('财')?8:0)+ysRatio*15+monthHelp*0.3;
  let love=50+(wx.c['火']+wx.c['水'])/wx.t*20+(lnSS.includes('财')||lnSS.includes('官')?10:0)+(ss.dzc.some(c=>c.s.includes('财')||c.s.includes('官'))?8:0)+ysRatio*12;
  let health=55+((wx.t-Math.abs(wx.c[wx.s]-wx.c[wx.w]))/wx.t)*25+(wx.c[wx.w]>1?8:0)+ysRatio*10+monthHelp*0.2;

  // —— TJX 高级修正：把大运/流年的精算评分按权重融合 ——
  if(tjx){
    // 命局基础品质（成格/中和/用神有力）修正所有维度的"天花板"
    const baseFix=(tjx.lifeGrade.score-60)*0.15;
    career+=baseFix; wealth+=baseFix; love+=baseFix*0.6; health+=baseFix*0.4;

    // 用流年精算分（-100~100）按 0.25 权重修正
    if(tjx.lnScore){
      const lf=tjx.lnScore.score*0.18;
      career+=lf; wealth+=lf*0.9; love+=lf*0.5; health+=lf*0.4;
    }
    // 大运精算分按 0.12 权重
    if(tjx.dyScore){
      const df=tjx.dyScore.score*0.10;
      career+=df; wealth+=df; love+=df*0.4; health+=df*0.5;
    }
    // 刑冲扣健康/感情分
    const ints=tjx.interactions;
    health-=Math.min(ints.zhi_chong.length*2.5,8);
    health-=Math.min(ints.zhi_xing.length*2,6);
    love-=Math.min(ints.zhi_chong.length*2,7);
    // 三合/三会加事业财富
    const triFull=ints.san_he.filter(x=>x.full).length+ints.san_hui.length;
    career+=triFull*3; wealth+=triFull*3;
  }

  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,Math.round(v)));
  return{
    career:clamp(career,18,98),
    wealth:clamp(wealth,18,97),
    love:clamp(love,20,96),
    health:clamp(health,25,96)
  };
}

function calcPattern(ss){
  const pa=[],ash=[ss.yg,ss.mg,ss.hg];
  if(ash.includes('正官'))pa.push('正官格');
  if(ash.includes('七杀'))pa.push('七杀格');
  if(ash.includes('正财')||ash.includes('偏财'))pa.push('财星格');
  if(ash.includes('食神'))pa.push('食神格');
  if(ash.includes('伤官'))pa.push('伤官格');
  if(ash.includes('正印')||ash.includes('偏印'))pa.push('印绶格');
  if(!pa.length)pa.push('杂气格');
  return pa;
}

function buildContext(args){
  const{b,wx,ss,dy,ln,zw,qm,mh,si,shensha,liuyue,P,gen,q,city,input}=args;
  const dg=b.D.g,dw=GW[dg];
  const by=input.by,bm=input.bm,bd=input.bd;
  const age=TJ.calcAge(by,bm,bd);
  const cDy=TJ.findDaYun(dy,age);
  const cLn=TJ.findLiuNian(ln,CURR_YEAR);
  const cLm=TJ.findLiuYue(liuyue);
  const dySS=cDy?TJ.ssOf(dg,cDy.g):'';
  const lnSS=cLn?TJ.ssOf(dg,cLn.g):'';
  const lmSS=cLm?TJ.ssOf(dg,cLm.gz.charAt(0)):'';
  const gl=gen==='male'?'乾造':'坤造';
  const pa=calcPattern(ss);
  // 预先算一次 TJX 用于评分修正（compute 内成本可接受，可缓存）
  let _tjxPre=null;
  try{_tjxPre=TJX.compute(b,ss);
      if(cDy)_tjxPre.dyScore=_tjxPre.pillarScore({g:cDy.g,z:cDy.z});
      if(cLn)_tjxPre.lnScore=_tjxPre.pillarScore({g:cLn.g,z:cLn.z});
  }catch(e){}
  const sc=calcYearScores(b,wx,ss,dySS,lnSS,_tjxPre,cDy,cLn);
  const shun=TJ.isShunDaYun(b,gen);
  return{
    input,
    b,wx,ss,dy,ln,zw,qm,mh,si,shensha,liuyue,pa,P,
    gen,q,city,gl,
    by,bm,bd,age,
    dg,dz:b.D.z,dw,
    cDy,cDyIdx:cDy?cDy._idx:0,cDySS:dySS,
    cLn,cLnSS:lnSS,
    cLm,cLmSS:lmSS,
    dyShun:shun,
    dySS,lnSS,lmSS,
    scores:sc,
    cs:sc.career,ws:sc.wealth,ls:sc.love,hs:sc.health,
    ssOf:g=>TJ.ssOf(dg,g),
    /* —— TJX 精算内核派生量（复用 _tjxPre 避免重算）—— */
    tjx: (function(){
      try{
        const k=_tjxPre||TJX.compute(b,ss);
        if(cDy&&!k.dyScore)k.dyScore=k.pillarScore({g:cDy.g,z:cDy.z});
        if(cLn&&!k.lnScore)k.lnScore=k.pillarScore({g:cLn.g,z:cLn.z});
        k.lnEvents = cLn?k.yearEvents({g:cLn.g,z:cLn.z},cDy?{g:cDy.g,z:cDy.z}:null):[];
        return k;
      }catch(e){console.warn('TJX compute failed',e);return null;}
    })()
  };
}

    {t:'用神',d:'为了让命盘结构更协调，分析时优先借助的五行方向。',p:'用神可从扶抑、调候、通关、病药等角度选取，不等于“缺什么就补什么”。',see:['wuxing','timeline'],rel:['喜神','忌神','扶抑','调候','通关']},
    {t:'喜神',d:'能帮助用神、对整体协调有辅助作用的五行。',p:'喜神通常次于主用神，实际取法会因流派和命局结构而异。',see:['wuxing'],rel:['用神','忌神']},
    {t:'忌神',d:'在当前分析框架下，容易加重失衡的五行方向。',p:'忌神不代表对应的人事物永远不好；岁运组合和现实选择会改变具体表现。',see:['wuxing','risk'],rel:['用神','喜神']},
    {t:'扶抑',d:'日主偏弱就扶助，偏旺就泄耗或制约，让整体趋于平衡。',p:'扶抑取用是常见方法之一，但极端格局或调候需求可能优先于简单强弱。',see:['wuxing'],rel:['身旺','身弱','用神']},
    {t:'调候',d:'根据寒、暖、燥、湿调整命盘气候，就像先处理温度和水分。',p:'调候常参考日主与月令组合，重视季节急需的天干，并不完全等同扶抑用神。',see:['wuxing'],rel:['月令','用神','穷通宝鉴']},
    {t:'通关',d:'在两种冲突力量之间加入能量桥梁，让关系由克转生。',p:'例如木土交战时用火承接木生火、火生土；是否有效仍要看中间五行是否有力。',see:['wuxing'],rel:['相生','相克','用神']},
    {t:'泄秀',d:'日主有力时，通过食神或伤官把能量转成表达、技能和作品。',p:'传统上常用于描述身旺而食伤有力、输出顺畅的结构。',see:['persona'],rel:['食神','伤官','身旺']},

    // —— 格局 ——

    {t:'正官格',d:'以月令正官为核心建立的格局。',p:'传统上重视官星清纯、有财印配合并避免严重伤官破坏。',see:['bazi'],rel:['正官','格局','伤官见官']},
    {t:'七杀格',a:['偏官格'],d:'以月令七杀为核心建立的格局。',p:'通常关注七杀是否有制、有化或日主能否承载。',see:['bazi'],rel:['七杀','食神制杀','杀印相生']},
    {t:'食神格',d:'以月令食神为核心建立的格局。',p:'常关注食神是否有力、能否生财或制杀，以及是否被偏印强力克制。',see:['bazi'],rel:['食神','食神制杀','枭神夺食']},
    {t:'伤官格',d:'以月令伤官为核心建立的格局。',p:'重视表达和突破能力，也需观察与官星、印星、财星的配合。',see:['bazi'],rel:['伤官','伤官见官','格局']},
    {t:'财格',a:['正财格','偏财格'],d:'以月令财星为核心建立的格局。',p:'传统上关注财星是否有源、日主能否承载，以及官印食伤的配合。',see:['bazi'],rel:['财星','正财','偏财']},
    {t:'印格',a:['正印格','偏印格','印绶格'],d:'以月令印星为核心建立的格局。',p:'常关注印星是否清纯、日主是否受益，以及食伤财星对结构的影响。',see:['bazi'],rel:['印星','正印','偏印']},
    {t:'建禄格',d:'月令处在日主的临官禄地，日主通常根气较足。',p:'建禄格不能只凭月支确定喜忌，仍需看全局财官食伤与比劫配置。',see:['bazi'],rel:['格局','身旺','月令']},
    {t:'月刃格',a:['羊刃格'],d:'月令处在日主的刃地，通常表现为日主力量集中。',p:'传统上常重视官杀制刃与食伤泄秀；具体判法有流派差异。',see:['bazi'],rel:['羊刃','格局','官杀']},
    {t:'从格',a:['从财格','从官格','从杀格','从儿格'],d:'日主极弱且难以自立时，顺从命局中最强的一方来取用。',p:'从格条件严格，若日主仍有明显根气或生扶，通常不能轻易判从。',see:['bazi','wuxing'],rel:['身弱','格局','用神']},

    // —— 时间层级 ——

    {t:'起运',a:['起运岁数'],d:'从出生到进入第一步大运之间的换算年龄。',p:'常以出生时刻至前一个或后一个“节”的时间，按三天折一年等规则换算。',see:['dayun','timeline'],rel:['大运','节气','顺排','逆排']},
    {t:'顺排',d:'大运从月柱开始按干支顺序向后排列。',p:'常见规则按出生年干阴阳与性别决定顺逆，不同流派可能采用不同口径。',see:['dayun'],rel:['逆排','大运','起运']},
    {t:'逆排',d:'大运从月柱开始按干支顺序向前排列。',p:'常见规则按出生年干阴阳与性别决定顺逆，不同流派可能采用不同口径。',see:['dayun'],rel:['顺排','大运','起运']},
    {t:'流年',d:'某一公历年份对应的干支，用来观察当年的阶段主题。',p:'流年应与原局、大运共同分析，不能脱离大运单独作绝对判断。',see:['trend','liuyue'],rel:['大运','流月','太岁']},
    {t:'流月',d:'流年中的月度干支，用来细分每个月的节奏。',p:'流月通常以节气交接，不等同公历每月一日或农历初一。',see:['liuyue','monthly'],rel:['流年','节气','月令']},
    {t:'本命年',d:'流年地支与出生年支相同的年份。',p:'本命年常被视为某些主题被放大，并不自动等于不吉。',see:['timeline','trend'],rel:['太岁','伏吟','流年']},
    {t:'太岁',d:'当年流年的地支及其象征性称呼。',p:'合、冲、刑、害太岁是传统岁运关系描述，不应直接等同具体事件。',see:['trend','risk'],rel:['流年','本命年','冲太岁']},
    {t:'冲太岁',d:'出生年支与流年地支构成六冲。',p:'传统上多解释为变化和不稳定性增加；变化也可能是主动调整而非单纯坏事。',see:['risk','trend'],rel:['太岁','六冲','流年']},
    {t:'岁运并临',d:'流年干支与当前大运干支完全相同。',p:'传统上认为同一信号叠加、阶段主题更集中，但吉凶仍取决于该干支对原局的作用。',see:['dayun','trend'],rel:['大运','流年','伏吟']},
    {t:'伏吟',d:'相同的干支或地支重复出现，表示同类主题被重复强调。',p:'伏吟常对应重复、停滞或感受加深，也可能是同一事情持续推进，不能一概论凶。',see:['bazi','risk'],rel:['反吟','岁运并临','本命年']},
    {t:'反吟',d:'两组干支形成明显天克地冲，表示对立与变化加大。',p:'传统上与伏吟相对使用；是否构成以及影响大小需结合具体柱位和喜忌。',see:['bazi','risk'],rel:['伏吟','六冲','相克']},

    // —— 干支关系 ——

    {t:'六合',d:'十二地支两两相合的六组关系，如子丑合、寅亥合。',p:'六合可表示连接、牵绊或合作；能否合化及实际作用要看全局。',see:['bazi'],rel:['六冲','三合','合化']},

    {t:'三合',a:['三合局'],d:'三组地支共同形成一种五行倾向，如申子辰合水。',p:'三支齐全称全局；两支可称半合，但力量与成局条件不同。',see:['bazi','wuxing'],rel:['三会','六合','半合']},

    {t:'桃花',a:['咸池'],d:'传统上与人缘、审美、社交吸引力相关的神煞。',p:'桃花不自动等于恋爱或感情问题，要看是否在命局出现、被何种岁运引动。',see:['loveMode','loveMatch'],rel:['神煞','红艳','配偶宫']},
    {t:'驿马',d:'传统上与移动、出行、迁居和环境变化相关的神煞。',p:'命带驿马不等于一定远走，可能表现为工作流动、跨界或频繁奔波。',see:['risk','timeline'],rel:['神煞','流年','六冲']},
    {t:'华盖',d:'传统上与独立思考、艺术、宗教玄学兴趣相关的神煞。',p:'也可能表现为享受独处或社交筛选较强，不宜简单解释为孤独。',see:['persona'],rel:['神煞','文昌']},
    {t:'天乙贵人',a:['天乙'],d:'传统上象征协助、转圜与关键支持的吉神。',p:'是否真正得到帮助仍取决于现实关系和行动，神煞只作辅助提示。',see:['bazi'],rel:['神煞','文昌','将星']},
    {t:'文昌',a:['文昌贵人'],d:'传统上与学习、表达、考试和文书能力相关的神煞。',p:'出现文昌不代表考试必胜，仍要结合印星、食伤及现实准备。',see:['bazi','persona'],rel:['神煞','印星','食伤']},
    {t:'将星',d:'传统上与组织、带领、掌控局面相关的神煞。',p:'将星只提供辅助象意，管理能力仍需结合官杀、比劫和现实经历。',see:['bazi','persona'],rel:['神煞','官杀']},
    {t:'红艳',a:['红艳煞'],d:'传统上与情感表现、个人吸引力和审美感受相关的神煞。',p:'红艳不是感情结果的保证，也不应被直接解释为风流。',see:['loveMode'],rel:['桃花','神煞']},
    {t:'羊刃',a:['阳刃'],d:'日主力量走到较强位置的一种传统标记。',p:'常象征决断、竞争与强度；是否有利要看官杀制衡、食伤泄秀及整体旺衰。',see:['bazi','persona'],rel:['月刃格','官杀','身旺']},
    {t:'空亡',a:['旬空'],d:'每一旬六十甲子中没有轮到的两个地支。',p:'传统上用于观察某些主题的落空、延迟或形式变化，但通常只作辅助判断。',see:['bazi'],rel:['六十甲子','神煞']},
    {t:'十二长生',a:['长生十二宫'],d:'用长生、沐浴、冠带、临官、帝旺等十二阶段描述天干在地支中的状态。',p:'十二长生用于观察根气和阶段象意，不宜脱离月令与藏干单独定旺衰。',see:['bazi','wuxing'],rel:['临官','帝旺','墓','绝']},
    {t:'真太阳时',d:'把当地钟表时间按经度与均时差校正为太阳实际位置对应的时间。',p:'校正可能改变时柱，尤其出生时间接近时辰边界时；海外地点还需正确处理当地时区与夏令时。',see:['bazi'],rel:['时柱','节气','出生时间']},
    {t:'乾造',d:'传统排盘中对男性命盘的称呼。',p:'“造”指命造；现代使用中它只是性别标记，不代表价值高低。',see:['bazi'],rel:['坤造','四柱']},
    {t:'坤造',d:'传统排盘中对女性命盘的称呼。',p:'“造”指命造；现代使用中它只是性别标记，不代表价值高低。',see:['bazi'],rel:['乾造','四柱']},
    {t:'配偶宫',a:['婚姻宫'],d:'传统上把日支称为配偶宫，用来辅助观察亲密关系主题。',p:'配偶宫只是关系分析的一部分，还需结合配偶星、全局组合与现实互动。',see:['bazi','loveMode'],rel:['日柱','日支','财星','官杀']},
    {t:'日支',d:'日柱下方的地支，也是传统所称的配偶宫位置。',p:'日支同时参与藏干、合冲刑害及日主根气判断，不能只用于婚姻分析。',see:['bazi','loveMode'],rel:['日柱','配偶宫','藏干']},
    {t:'时辰',d:'传统上把一天分成十二个时辰，每个时辰约对应现代时间两小时。',p:'子时横跨23点至1点；不同流派对23点后的换日口径可能不同。',see:['bazi'],rel:['时柱','地支','出生时间']},
    {t:'出生时间',d:'排盘使用的出生地当地钟表时间，是确定时柱的重要输入。',p:'接近23点、时辰边界或节气交接时，几分钟误差也可能改变日柱、时柱或月柱。',see:['bazi'],rel:['时辰','真太阳时','节气']},
    {t:'穷通宝鉴',d:'一部以十天干在十二月令中的调候需求为主线的传统命理著作。',p:'现代排盘常参考其中的调候用神，但不同版本与解释流派可能存在差异。',see:['wuxing'],rel:['调候','月令','用神']},

    {t:'帝旺',d:'十二长生中象征力量达到高点的阶段。',p:'帝旺表示根气象意较强，不等于人生运势必然处在最高点。',see:['bazi'],rel:['十二长生','临官','身旺']},
    {t:'墓',a:['墓库'],d:'十二长生中的收藏阶段，也常与辰戌丑未四库联系。',p:'墓库是否开启、收藏何种五行及实际作用，需结合冲合、月令和藏干判断。',see:['bazi'],rel:['十二长生','藏干','六冲']},
    {t:'绝',d:'十二长生中表示前一轮力量连接较弱的阶段。',p:'“绝”是状态名称，不应直接理解成现实中的绝境或灾祸。',see:['bazi'],rel:['十二长生','旺衰']}

const KBSearch={
  // Levenshtein 距离归一化为 0~1 的相似度
  similar(a,b){
    a=String(a||'').toLowerCase();b=String(b||'').toLowerCase();
    if(!a||!b)return 0;
    if(a===b)return 1;
    if(a.includes(b)||b.includes(a))return 0.8;
    const m=a.length,n=b.length;
    if(Math.abs(m-n)>Math.max(m,n)*0.6)return 0;
    const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
    for(let i=0;i<=m;i++)dp[i][0]=i;
    for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
    return 1-dp[m][n]/Math.max(m,n);
  },
  search(q,topK){
    topK=topK||3;
    const ql=(q||'').toLowerCase().trim();
    if(!ql)return[];
    const intents=(typeof extractIntents==='function')?extractIntents(q):[];
    const scored=KB.faqs.map(f=>{
      let sc=0;
      // 关键词命中（每词 +5）
      (f.kw||[]).forEach(k=>{if(ql.includes(k.toLowerCase()))sc+=5;});
      // 意图命中 +6
      if(intents.includes(f.intent))sc+=6;
      // 标题相似度（最高 8 分）
      sc+=this.similar(ql,f.q)*8;
      // 标题包含关键词时再加成
      if(ql.length>=2&&f.q.toLowerCase().includes(ql.slice(0,2)))sc+=2;
      return{f,sc};
    }).filter(x=>x.sc>2.5).sort((a,b)=>b.sc-a.sc).slice(0,topK);
    return scored;
  },
  // 联想：用于输入框实时下拉（前 N 条）
  suggest(q,topK){
    topK=topK||6;
    if(!q||q.length<1)return KB.faqs.slice(0,topK);
    return this.search(q,topK).map(x=>x.f);
  },
  // 按意图筛选（chips 分类用）
  byIntent(intent){
    return KB.faqs.filter(f=>f.intent===intent);
  },
  // 提取“单个术语”查询。只在精确输入或明确询问释义时命中，避免把“今年正官如何”误判为词典查询。
  normalizeTermQuery(q){
    const raw=String(q||'').trim();
    const compact=raw.replace(/[\s？?。！!，,、：:；;“”‘’'"《》【】（）()]/g,'');
    const hasCue=/(什么是|什么叫|何为|是什么意思|指什么|含义|解释|怎么理解|如何理解|说说|讲讲)/.test(compact);
    let candidate=compact
      .replace(/^(请问|请|帮我|麻烦|能否|可以|请你|帮忙)?(解释一下|解释|说说|讲讲|什么是|什么叫|何为)/,'')
      .replace(/(是什么意思|是什么|的意思|的含义|含义是什么|怎么理解|如何理解|指什么|指的是什么|呢)$/,'');
    return{raw,compact,candidate,hasCue};
  },
  findTerm(q){
    const info=this.normalizeTermQuery(q);if(!info.compact)return null;
    const names=t=>[t.t,...(t.a||[])];
    // 单独输入术语或别名：直接解释
    let hit=KB.terms.find(t=>names(t).some(n=>info.compact===n||info.candidate===n));
    if(hit)return hit;
    // 明确说“解释/什么意思”时，允许从整句中提取术语；优先最长名称
    if(info.hasCue){
      const all=KB.terms.flatMap(t=>names(t).map(n=>({t,n}))).sort((a,b)=>b.n.length-a.n.length);
      const found=all.find(x=>info.compact.includes(x.n)||info.candidate.includes(x.n));
      if(found)return found.t;
      if(info.candidate.length<=8){
        let best=null,score=0;
        all.forEach(x=>{const sc=this.similar(info.candidate,x.n);if(sc>score){score=sc;best=x.t;}});
        if(score>=0.82)return best;
      }
    }
    return null;
  },
  suggestTerms(q,topK){
    topK=topK||5;const info=this.normalizeTermQuery(q);const key=info.candidate||info.compact;
    const defaults=['用神','日主','十神','大运','流年','身旺'].map(n=>KB.terms.find(t=>t.t===n)).filter(Boolean);
    if(!key)return defaults.slice(0,topK);
    return KB.terms.map(t=>{
      const ns=[t.t,...(t.a||[])];let sc=0;
      ns.forEach(n=>{if(n===key)sc=Math.max(sc,20);else if(n.startsWith(key))sc=Math.max(sc,12);else if(n.includes(key)||key.includes(n))sc=Math.max(sc,8);else sc=Math.max(sc,this.similar(key,n)*5);});
      return{t,sc};
    }).filter(x=>x.sc>=3.2).sort((a,b)=>b.sc-a.sc||a.t.t.length-b.t.t.length).slice(0,topK).map(x=>x.t);
  }
};

/* ============================================================
   术语个性化提示：仅说明该术语在当前命盘中的位置，不把术语解释成确定事件
   ============================================================ */
function buildTermContextNote(term,d){
  if(!term||!d)return'';const t=term.t;
  if(t==='日主')return`你的日主是「${d.dg}」，五行属${d.dw}。`;
  if(t==='日柱')return`你的日柱是「${d.b.D.g}${d.b.D.z}」。`;
  if(t==='月柱')return`你的月柱是「${d.b.M.g}${d.b.M.z}」，其中${d.b.M.z}也是月令。`;
  if(t==='年柱')return`你的年柱是「${d.b.Y.g}${d.b.Y.z}」。`;
  if(t==='时柱')return`你的时柱是「${d.b.H.g}${d.b.H.z}」。`;
  if(t==='月令')return`你的月令是「${d.b.M.z}」，对应${ZW[d.b.M.z]}。`;
  if(t==='用神')return`当前算法给出的主用方向是「${d.wx.ys}」。它是分析结论，不等同于生活中只使用这一种元素。`;
  if(t==='喜神')return`当前算法给出的辅助喜神是「${d.wx.xs}」。`;
  if(t==='忌神')return`当前算法把「${d.wx.KE[d.wx.dw]}」作为主要制衡提醒；这不代表相关人事物一定不好。`;
  if(['身旺','身弱','旺衰','得令','得地','得势'].includes(t))return`本报告当前把你的整体强弱归为「${d.wx.st?'身旺':'身弱'}」；大师版可查看五行与旺衰依据。`;
  if(t==='大运'||t==='起运'||t==='顺排'||t==='逆排')return d.cDy?`你${d.dy.sa}岁起运，目前在「${d.cDy.g}${d.cDy.z}」大运（${d.cDy.as}～${d.cDy.ae}岁），采用${d.dyShun?'顺排':'逆排'}。`:'';
  if(t==='流年'||t==='太岁'||t==='本命年'||t==='冲太岁')return d.cLn?`${CURR_YEAR}年的流年是「${d.cLn.g}${d.cLn.z}」。`:'';
  if(t==='流月')return d.cLm?`当前流月为「${d.cLm.gz}」（${d.cLm.name}）。`:'';
  if(t==='真太阳时')return`本次排盘${d.input&&d.input.useTrueSolar?'已开启':'未开启'}真太阳时校正。`;
  if(t==='格局'||/格$/.test(t))return`本报告的格局结果为「${(d.pa&&d.pa.length?d.pa.join('、'):'未定格')}」。格局只是分析框架，不代表人的等级。`;
  const tenGods=['比肩','劫财','食神','伤官','正财','偏财','正官','七杀','正印','偏印'];
  if(tenGods.includes(t)){
    const q=d.tjx&&d.tjx.tenGodQuality&&d.tjx.tenGodQuality[t];
    if(q)return q.transparent||q.hidden?`在你的命盘中，「${t}」天干出现${q.transparent}次，地支藏干权重约${q.hidden}；是否重要还要结合位置和旺衰。`:`你的原局中「${t}」不明显，但大运或流年仍可能带来这一主题。`;
  }
  const groups={比劫:['比肩','劫财'],食伤:['食神','伤官'],财星:['正财','偏财'],官杀:['正官','七杀'],印星:['正印','偏印']};
  if(groups[t]){
    const names=groups[t],visible=[d.ss.yg,d.ss.mg,d.ss.hg].filter(x=>names.includes(x));
    return visible.length?`你的年、月、时天干中可见${visible.join('、')}，属于「${t}」主题。`:`你的年、月、时天干中「${t}」不明显，仍需结合地支藏干。`;
  }
  const shaNames=['桃花','驿马','华盖','天乙贵人','文昌','将星','红艳','羊刃','空亡'];
  if(t==='神煞'||shaNames.includes(t)){
    const list=(d.shensha||[]).map(x=>x.n);if(t==='神煞')return list.length?`本报告列出的神煞有：${list.join('、')}。它们只作辅助提示。`:'本报告未列出突出神煞。';
    return list.includes(t)?`本报告列出了「${t}」，建议只把它作为辅助象意。`:`本报告没有把「${t}」列为突出标记。`;
  }
  const ints=d.tjx&&d.tjx.interactions;
  if(ints){
    if(t==='天干五合')return ints.gan_he.length?`你的原局检测到${ints.gan_he.length}组天干合。`:'你的原局未检测到明显天干五合。';
    if(t==='六合')return ints.zhi_he.length?`你的原局检测到${ints.zhi_he.length}组地支六合。`:'你的原局未检测到明显六合。';
    if(t==='六冲')return ints.zhi_chong.length?`你的原局检测到${ints.zhi_chong.length}组地支冲。`:'你的原局未检测到明显六冲。';
    if(t==='相刑')return ints.zhi_xing.length?`你的原局检测到${ints.zhi_xing.length}组刑。`:'你的原局未检测到明显相刑。';
    if(t==='相害')return ints.zhi_hai.length?`你的原局检测到${ints.zhi_hai.length}组害。`:'你的原局未检测到明显相害。';
    if(t==='三合')return ints.san_he.length?`你的原局检测到：${ints.san_he.map(x=>x.zhi+'·'+x.wx).join('、')}。`:'你的原局未检测到明显三合组合。';
    if(t==='三会')return ints.san_hui.length?`你的原局检测到：${ints.san_hui.map(x=>x.zhi+'·'+x.wx).join('、')}。`:'你的原局未检测到完整三会组合。';
  }
  return'';
}

/* ============================================================
   智能回答（优先单术语 → KB → API/fallback）
   ============================================================ */
function smartAnswer(q,ctx){
  if(!ctx)ctx=getCtx();if(!ctx)return null;
  // 1) 单个术语命中：本地即时解释，不依赖远程 API
  const term=KBSearch.findTerm(q);
  if(term){
    const links=(term.see||[]).map(k=>KB.routes[k]).filter(Boolean);
    return{
      kind:'term',term,
      title:term.t,
      sections:[
        {title:'释义',content:term.d},
        {title:'专业补充',content:term.p||''},
        {title:'你的命盘',content:buildTermContextNote(term,ctx)}
      ],
      links,
      related:term.rel||[]
    };
  }
  // 2) FAQ 命中（高置信）
  const hits=KBSearch.search(q,3);
  if(hits.length&&hits[0].sc>=8){
    const f=hits[0].f;
    let lines;
    try{lines=f.answer(ctx);}catch(e){lines=['信息计算异常','','',''];}
    const route=KB.routes[f.anchor];
    return{
      kind:'faq',
      title:f.q,
      sections:[
        {title:'结论',content:lines[0]||'-'},
        {title:'命理原因',content:lines[1]||'-'},
        {title:'当前阶段',content:lines[2]||'-'},
        {title:'行动建议',content:lines[3]||'-'}
      ],
      links:route?[route]:[],
      related:(f.related||[]).map(rid=>KB.faqs.find(x=>x.id===rid)).filter(Boolean),
      confidence:hits[0].sc
    };
  }
  return null;
}

/* ============================================================
   跳转 + 高亮
   ============================================================ */
function jumpTo(secId,cardKey){
  // 工具卡：弹窗模式
  if(['layoffRisk','layoff','relAi','career','careerTool','toolCareer','wealth','wealthTool','toolWealth','luckyDay','luckyTool','toolLuckyDay','energy','energyTool','toolEnergy','naming','namingTool','toolNaming','qian','qianTool','toolQian','fine','finePan','toolFine','guji','gujiTool','toolGuji'].includes(cardKey)){
    const tab=document.querySelector('.tab-item[data-sec="s-tool"]');
    if(tab&&!tab.classList.contains('active'))tab.click();
    setTimeout(function(){
      let target='layoff';
      if(cardKey==='relAi')target='relAi';
      else if(['career','careerTool','toolCareer'].includes(cardKey))target='career';
      else if(['wealth','wealthTool','toolWealth'].includes(cardKey))target='wealth';
      else if(['luckyDay','luckyTool','toolLuckyDay'].includes(cardKey))target='luckyDay';
      else if(['energy','energyTool','toolEnergy'].includes(cardKey))target='energy';
      else if(['naming','namingTool','toolNaming'].includes(cardKey))target='naming';
      else if(['qian','qianTool','toolQian'].includes(cardKey))target='qian';
      else if(['guji','gujiTool','toolGuji'].includes(cardKey))target='guji';
      else if(['fine','finePan','toolFine'].includes(cardKey)){const tabM=document.querySelector('.tab-item[data-sec="s-ming"]'); if(tabM) tabM.click(); setTimeout(()=>{const grp=document.querySelector('[data-card="coreProfile"]'); if(grp){const btn=grp.querySelector('.feature-tab[data-pane="fine"]'); if(btn) featureSwitchTab(btn);} },200); return;}
      openToolModal(target);
    },200);
    return;
  }
  const advancedCards=new Set(['bazi','wuxing','timeline','dayun','liuyue']);
  if(getReadingMode()==='beginner'&&advancedCards.has(cardKey))setReadingMode('pro',{keepScroll:true});
  // 关 AI 面板
  if(typeof closeAsk==='function')closeAsk();
  // 若 secId 为空，从 KB.routes 推断；同时取 sub（合并卡子区）
  let subKey=null,routeCard=cardKey;
  if(cardKey&&KB&&KB.routes&&KB.routes[cardKey]){
    const r=KB.routes[cardKey];
    if(!secId)secId=r.sec;
    if(r.sub)subKey=r.sub;
    routeCard=r.card; // 重定向到真正的 DOM data-card
  }
  // 切 tab
  const tab=document.querySelector('.tab-item[data-sec="'+secId+'"]');
  if(tab&&!tab.classList.contains('active'))tab.click();
  // 重写：使用 routeCard 进行查找
  cardKey=routeCard;
  // 滚动+高亮
  setTimeout(()=>{
    let el=null;
    if(cardKey){
      el=document.querySelector('[data-card="'+cardKey+'"]');
    }
    if(!el){
      el=document.getElementById(secId);
    }
    if(!el)return;
    // 命中整合卡内的子功能时，先切换对应子标签，再定位整张分组卡
    const featurePane=el.matches&&el.matches('.feature-pane')?el:(el.closest?el.closest('.feature-pane'):null);
    if(featurePane){
      const group=featurePane.closest('.feature-group');
      const paneKey=featurePane.dataset.featurePane;
      const paneTab=group&&group.querySelector('.feature-tab[data-pane="'+paneKey+'"]');
      if(paneTab&&typeof featureSwitchTab==='function')featureSwitchTab(paneTab);
      if(group)el=group;
    }
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.add('tj-flash');
    setTimeout(()=>el.classList.remove('tj-flash'),1800);
    // 如果是「当下关注」的子区跳转，自动激活对应子 tab
    if(subKey){
      const sub=el.querySelector('.focus-tab[data-sub="'+subKey+'"]');
      if(sub)sub.click();
    }
    // 如果卡片是折叠状态，自动展开
    if(el.classList.contains('collapsed'))el.classList.remove('collapsed');
  },280);
}

      return arr.length?'【精算·干支互动】'+arr.join(' | '):'';
    })():'',

function formatAIText(text){let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1</span>').replace(/【(.+?)】/g,'<span class="tg">$1</span>').replace(/#{1,4}\s*(.+)/g,'<h4>$1</h4>').split(/\n{2,}/).map(p=>p.trim()?`<p>${p.replace(/\n/g,'<br>')}</p>`:'').join('');return h||`<p>${text.replace(/\n/g,'<br>')}</p>`;}

function getLayoffAstroRisk(d){
  if(!d||!d.b)return{score:20,label:'信息不足',reasons:[],protectors:[],window:'未来3—6个月'};
  const chong={子:'午',午:'子',丑:'未',未:'丑',寅:'申',申:'寅',卯:'酉',酉:'卯',辰:'戌',戌:'辰',巳:'亥',亥:'巳'};
  const lnSS=d.lnSS||d.cLnSS||'',dySS=d.dySS||d.cDySS||'',lmSS=d.lmSS||d.cLmSS||'';
  let score=20;
  const reasons=[],protectors=[];
  if(d.cs<45){score+=16;reasons.push('年度事业评分偏低');}
  else if(d.cs<60){score+=8;reasons.push('事业势能处于守势');}
  else if(d.cs>=75){score-=7;protectors.push('年度事业势能较强');}
  if(lnSS==='七杀'){score+=11;reasons.push('流年七杀主考核与压力');}
  if(lnSS==='伤官'&&/官|杀/.test(dySS)){score+=14;reasons.push('伤官见官，易有制度或上级冲突');}
  else if(lnSS==='伤官'){score+=6;reasons.push('流年伤官，沟通与规则摩擦增多');}
  if(lnSS==='劫财'){score+=7;reasons.push('流年劫财，同岗竞争加剧');}
  if(/正印|偏印/.test(lnSS)){score-=5;protectors.push('流年印星利资源与支持');}
  if(/正官/.test(lnSS)&&d.cs>=60){score-=4;protectors.push('正官到位，利正规评价与晋升通道');}
  if(d.cLn&&chong[d.cLn.z]===d.b.M.z){score+=13;reasons.push('流年冲月柱，工作环境易变');}
  if(d.cDy&&chong[d.cDy.z]===d.b.M.z){score+=9;reasons.push('大运冲月柱，组织关系处于变动期');}
  if(d.cLn&&d.cLn.z===d.b.M.z){score+=4;reasons.push('流年伏吟月柱，职场议题被放大');}
  if(lmSS==='七杀'||lmSS==='伤官'){score+=5;reasons.push('当前流月考核或沟通压力上升');}
  if(d.tjx&&d.tjx.lnScore){
    if(d.tjx.lnScore.score<=-30){score+=11;reasons.push('精算流年分偏弱');}
    else if(d.tjx.lnScore.score<0){score+=5;reasons.push('精算流年略有阻力');}
    else if(d.tjx.lnScore.score>=30){score-=6;protectors.push('精算流年走势偏吉');}
  }
  if(/正印|偏印/.test(dySS)){score-=4;protectors.push('当前大运有印星托底');}
  score=Math.max(8,Math.min(72,Math.round(score)));
  const label=score>=58?'波动偏高':score>=40?'需要留意':score>=25?'总体平稳':'低波动';
  const month=d.cLm&&d.cLm.name?d.cLm.name.replace(/\(.+?\)/g,''):'';
  return{score,label,reasons,protectors,window:month?`${month}起未来3—6个月`:'未来3—6个月'};
}

function calcLayoffRisk(){

  const getSelect=id=>{

function getRelationMode(dg,ss,gen){const map={甲:'独立型',乙:'依赖型',丙:'热情型',丁:'慢热型',戊:'务实型',己:'包容型',庚:'理性型',辛:'挑剔型',壬:'自由型',癸:'敏感型'};return map[dg]||'平衡型';}
function getSuitableType(wx,dg){const map={木:'情绪稳定、行动力强、土金偏旺的人',火:'包容性强、愿意给予空间的人',土:'有上进心、能带来新鲜感的人',金:'温柔细腻、善于沟通的人',水:'逻辑清晰、能给予安全感的人'};return map[wx.dw]||'五行互补、性格圆融的人';}
function getRelationRisks(wx,dg,ss){const r=[];if(wx.st)r.push('过于强势，容易忽略伴侣感受');if(!wx.st)r.push('过于迁就，边界感模糊导致委屈');if(ss.dzc.some(c=>c.s.includes('伤官')))r.push('言语锋利，易因沟通方式产生摩擦');if(wx.c['火']>3)r.push('情绪波动大，热情来得快去得也快');if(wx.c['水']>2.8)r.push('思虑过多，容易因猜疑产生隔阂');if(!r.length)r.push('暂无显著关系风险，保持真诚沟通即可');return r;}
function getDecisionAdvice(b,wx,dy,ln,scene){
  const ctx=getCtx();
  const age=ctx?ctx.age:(b._meta?TJ.calcAge(b._meta.by,b._meta.bm||1,b._meta.bd||1):0);
  const cDy=ctx?ctx.cDy:TJ.findDaYun(dy,age);
  const cLn=ctx?ctx.cLn:TJ.findLiuNian(ln,CURR_YEAR);
  if(!cDy||!cLn)return{label:'信息不足',window:'-',risk:'-',advice:'请先完整填写出生信息'};
  const dg=b.D.g,lnSS=TJ.ssOf(dg,cLn.g),dySS=TJ.ssOf(dg,cDy.g);
  if(scene==='跳槽'){const good=lnSS.includes('官')||lnSS.includes('财')||dySS.includes('官');return{label:good?'适合变动':'适合稳守',window:good?'未来3-5个月':'建议等到明年春季',risk:'情绪化决定',advice:'先拿Offer再离职，别裸辞'};}
  if(scene==='创业'){const good=wx.st&&(lnSS.includes('食')||lnSS.includes('伤')||lnSS.includes('财'));return{label:good?'可以尝试':'更适合联合创业',window:good?'秋季启动最佳':'先积累资源与人脉',risk:good?'资金链断裂':'单打独斗精力不足',advice:good?'找土金属性的合伙人':'先以副业验证模式'};}
  if(scene==='投资'){const good=lnSS.includes('财')&&wx.st;return{label:good?'偏财机会存在':'以稳健储蓄为主',window:good?'农历七月前后':'全年以固收为主',risk:'高风险短线操作',advice:good?'小仓位试水，见好就收':'远离杠杆与加密货币'};}
  return{label:'需结合具体时机',window:'近期非关键窗口',risk:'信息不足',advice:'建议先咨询专业顾问'};
}

function _qrCard(title,items,summary,actions){
  const itemsHtml=items.map(it=>`<div class="qr-item"><div class="qr-l">${it.l}</div><div class="qr-v"${it.c&&WC[it.c]?' style="color:'+WC[it.c]+'"':''}>${it.v}</div></div>`).join('');
  const actsHtml=(actions||[]).map(a=>`<button class="qr-act" onclick="jumpTo(null,'${a.k}')">${a.t}</button>`).join('');
  return `<div class="qr-card pro-only"><div class="qr-head"><span class="qr-badge">速读</span><span class="qr-title">${title}</span></div><div class="qr-grid">${itemsHtml}</div><div class="qr-summary">${summary}</div><div class="qr-acts">${actsHtml}</div></div>`;
}

function calcRelation(){
  const d=window._baziData;if(!d)return;
  const rd=document.getElementById('rDate').value,rt=document.getElementById('rTime').value||'06:00',rg=document.getElementById('rGen').value;
  if(!rd)return alert('请填写对方出生日期');
  const [y2,m2,d02]=rd.split('-').map(Number),[hh2,mm2]=rt.split(':').map(Number);
  const r2=resolveBirthDateTime(y2,m2,d02,hh2,mm2,false);
  const b2=mkBazi(r2.year,r2.month,r2.day,r2.hourZhi);
  const wx2=mkWx(b2),ss2=mkSs(b2);
  let score=65,notes=[];
  const sxMatch={鼠:'牛',牛:'鼠',虎:'猪',猪:'虎',兔:'狗',狗:'兔',龙:'鸡',鸡:'龙',蛇:'猴',猴:'蛇',马:'羊',羊:'马'};
  const sxChong={鼠:'马',马:'鼠',牛:'羊',羊:'牛',虎:'猴',猴:'虎',兔:'鸡',鸡:'兔',龙:'狗',狗:'龙',蛇:'猪',猪:'蛇'};
  if(sxMatch[d.b.sx]===b2.sx){score+=10;notes.push('生肖相合，属相投缘');}
  else if(sxChong[d.b.sx]===b2.sx){score-=8;notes.push('生肖相冲，需更多包容');}
  const dg1=d.b.D.g,dg2=b2.D.g;
  const ganHe={'甲':'己','己':'甲','乙':'庚','庚':'乙','丙':'辛','辛':'丙','丁':'壬','壬':'丁','戊':'癸','癸':'戊'};
  if(ganHe[dg1]===dg2){score+=8;notes.push('日干天合，精神契合度高');}
  const w1s=Object.entries(d.wx.c).sort((a,b)=>b[1]-a[1])[0][0],w1w=Object.entries(d.wx.c).sort((a,b)=>a[1]-b[1])[0][0];
  const w2s=Object.entries(wx2.c).sort((a,b)=>b[1]-a[1])[0][0],w2w=Object.entries(wx2.c).sort((a,b)=>a[1]-b[1])[0][0];
  if(w1s===w2w||w2s===w1w){score+=6;notes.push('五行互补，如天作之合');}
  score=Math.max(30,Math.min(99,score));
  const grade=score>=85?'上婚（极佳）':score>=70?'中婚（良好）':score>=55?'下婚（一般）':'需慎重';
  const gColor=score>=85?'#7ab648':score>=70?'#c8a45a':score>=55?'#d4a04a':'#d4654a';
  let H=`<div class="glass card-2"><div class="card-hd"><div class="card-ic">💞</div><div><div class="card-tt">AI 关系分析结果</div></div></div>`;
  H+=`<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div style="flex:1"><div style="font-size:1.8em;font-weight:700;color:${gColor}">${score}分</div><div style="font-size:.78em;color:rgba(255,255,255,0.4)">${grade}</div></div><div style="flex:2"><div class="hh-bar"><div class="hh-fill" style="width:0%;background:${gColor}" data-w="${score}%"></div></div></div></div>`;
  H+=`<div style="font-size:.82em;line-height:1.8;color:rgba(255,255,255,0.6)">${notes.map(t=>`· ${t}`).join('<br>')}</div>`;
  H+=`<div class="at"><h4>相处节奏</h4><p>${d.gen==='male'?'男方':'女方'}日主${dg1}，${d.gen==='male'?'女方':'男方'}日主${dg2}。${ganHe[dg1]===dg2?'双方天干相合，初期吸引力强，相处节奏偏快':'双方天干无明显合冲，相处节奏循序渐进，需时间磨合'}。</p>`;
  H+=`<h4>冲突点</h4><p>${sxChong[d.b.sx]===b2.sx?'生肖相冲，价值观与生活习惯差异较大，遇事容易对立':'无明显生肖冲克，冲突多来自沟通方式而非本质矛盾'}。</p>`;
  H+=`<h4>长期稳定性</h4><p>综合评分<span class="hl">${score}分</span>，属于<span class="hl">${grade}</span>。${score>=70?'长期稳定性良好，若能共同经营，白头偕老概率高':'需要双方持续投入经营，通过五行互补与环境调和可大幅提升稳定性'}。</p></div></div>`;
  document.getElementById('relResult').innerHTML=H;
  requestAnimationFrame(()=>{document.querySelectorAll('.hh-fill').forEach(el=>setTimeout(()=>el.style.width=el.dataset.w,150));});
}

function calcLuckyDays(){
  const d=getCtx();
  const out=document.getElementById('luckyDayResult');

  const inputEl=document.getElementById('ldInput');
  const input=(inputEl?inputEl.value:'').trim();
  const dg=d&&d.D?d.D.g:'甲';
  const ys=d&&d.wx?d.wx.ys:'水';

  let targetDays = 15;
  if(/30天|一个月|搬家|入宅|装修/.test(input)) targetDays = 30;
  if(/7天|一周|下周|近期|报到|面试/.test(input)) targetDays = 7;

  let topicName = '💼 重要签约/入职/商务事宜';
  if(/搬家|入宅|新房|装修|购置/.test(input)) topicName = '🏠 搬家入宅与新居启动';
  else if(/见家长|订婚|表白|约会|相亲|结婚/.test(input)) topicName = '❤️ 见家长表白与感情约会';
  else if(/发布|开工|开张|营业|上线/.test(input)) topicName = '🚀 项目启动与店铺开张';
  else if(input) topicName = '🎯 『' + (input.length>18?input.substring(0,18)+'...':input) + '』';

  const startTG = 4; // 戊
  const startDZ = 10; // 戌
  const now = new Date();

  const ganWx = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
  const ganHe = {'甲':'己','己':'甲','乙':'庚','庚':'乙','丙':'辛','辛':'丙','丁':'壬','壬':'丁','戊':'癸','癸':'戊'};
  const guiRenMap = {
    '甲':['丑','未'],'戊':['丑','未'],
    '乙':['子','申'],'己':['子','申'],
    '丙':['亥','酉'],'丁':['亥','酉'],
    '壬':['卯','巳'],'癸':['卯','巳'],
    '庚':['午','寅'],'辛':['午','寅']
  };
  const myGuiRen = guiRenMap[dg] || ['子','午'];
  const zhiChong = {'子':'午','午':'子','丑':'未','未':'丑','寅':'申','申':'寅','卯':'酉','酉':'卯','辰':'戌','戌':'辰','巳':'亥','亥':'巳'};

  const candidateDays = [];
  for(let i=1; i<=targetDays; i++){
    const dt = new Date(now.getTime() + i*86400000);
    const mStr = dt.getMonth() + 1;
    const dStr = dt.getDate();
    const wStr = ['日','一','二','三','四','五','六'][dt.getDay()];
    const tgIdx = (startTG + i) % 10;
    const dzIdx = (startDZ + i) % 12;
    const tg = TG[tgIdx];
    const dz = DZ[dzIdx];
    const dayWx = ganWx[tg];

    let score = 70;
    let reasons = [];
    if(myGuiRen.includes(dz)){ score += 18; reasons.push('天乙贵人当值照临，办事项极易获贵人扶持与解围'); }
    if(ganHe[dg] === tg){ score += 15; reasons.push('与你的日元干支天合，气场顺畅，沟通谈判阻力最小'); }
    if(dayWx === ys){ score += 14; reasons.push('当值天干五行为你的命盘喜用神【'+ys+'】，吉时势能倍增'); }
    if(zhiChong[dz] === myGuiRen[0] || dz === '戌' && dg==='辰'){ score -= 25; reasons.push('地支相冲，易遭遇突发变数、延误或双方意见对立'); }
    if(i % 7 === 3){ score -= 12; reasons.push('常规耗损日，适合常规内部整理，不宜做大决断'); }

    candidateDays.push({
      dateStr: `${mStr}月${dStr}日 (周${wStr})`,
      gz: `${tg}${dz}日`,
      tg, dz, dayWx, score, reasons,
      isAvoid: score < 60 || reasons.some(r=>r.includes('相冲'))
    });
  }

  candidateDays.sort((a,b) => b.score - a.score);
  const bestList = candidateDays.filter(x=>!x.isAvoid).slice(0, 3);
  const avoidList = candidateDays.filter(x=>x.isAvoid).slice(0, 2);
  if(bestList.length === 0) bestList.push(candidateDays[0]);

  const bestHtml = bestList.map(item => `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:.88em;font-weight:700;color:#7ab648">🌟 ${item.dateStr} · ${item.gz}</span>
        <span style="font-size:.72em;color:rgba(255,255,255,.45)">契合度: ${Math.min(99,item.score)}分</span>
      </div>
      <div style="font-size:.72em;color:rgba(255,255,255,.75);line-height:1.65">

        <b>入选理由</b>：${item.reasons.length ? item.reasons.join('；') : '五行干支合化顺意，气场和睦无阻力'}。
      </div>
    </div>
  `).join('');

  const avoidHtml = avoidList.map(item => `
    <div class="layoff-result-box" style="background:rgba(212,101,74,.08);border-color:rgba(212,101,74,.18);margin-bottom:6px">
      <div style="font-size:.78em;font-weight:600;color:#d4654a;margin-bottom:3px">⚠️ ${item.dateStr} · ${item.gz} (${item.reasons[0]||'相冲耗损'})</div>
      <div style="font-size:.68em;color:rgba(255,255,255,.6)">建议当天以常规例行工作为主，尽量避免当天签署重大合同、办理过户或大额转账。</div>
    </div>
  `).join('');

  out.innerHTML=`<div class="layoff-result">
    <div class="layoff-result-head">
      <div class="layoff-index" style="color:#7ab648">3<small>天吉日</small></div>
      <div><div class="layoff-level">吉日甄选完毕</div><div class="layoff-period">事项：${topicName} · 范围：未来 ${targetDays} 天</div></div>
    </div>
    <div style="font-size:.76em;color:rgba(255,255,255,.82);line-height:1.75;margin-bottom:10px">
      根据你的日元「<b>${dg}</b>」与喜用神「<b>${ys}</b>」，针对你要求办理的【<b>${topicName}</b>】，结合贵人合化为您严格筛选未来 ${targetDays} 天最佳窗口：
    </div>

    ${avoidList.length ? `<div style="font-size:.74em;color:#d4654a;font-weight:600;margin:10px 0 6px">避坑红灯日提示（务必留心）：</div><div>${avoidHtml}</div>` : ''}
    <div class="layoff-actions" style="margin-top:12px"><div class="layoff-actions-title">重要事项当天办理心法</div><ol>
      <li>出门前深呼吸 3 次，穿着喜用神【${ys}】对应开运色（如${ys==='火'?'暖红酒红':ys==='水'?'深蓝经典黑':ys==='金'?'极简白银':ys==='木'?'森林抹茶绿':'大地驼黄'}）。</li>

// —— 专业细盘工具函数 ——
const FINE_DZ_ORDER = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
const FINE_DZ_JZ = {子:0,丑:1,寅:2,卯:3,辰:4,巳:5,午:6,未:7,申:8,酉:9,戌:10,亥:11};

function getYearGanMonthStart(yearGan){
  const map = {甲:2,乙:4,丙:6,丁:8,戊:0,己:2,庚:4,辛:6,壬:8,癸:0}; // 丙寅起始索引
  // 甲己丙寅 乙庚戊寅 丙辛庚寅 丁壬壬寅 戊癸甲寅
  const table = {甲:'丙',乙:'戊',丙:'庚',丁:'壬',戊:'甲',己:'丙',庚:'戊',辛:'庚',壬:'壬',癸:'甲'};
  return table[yearGan]||'丙';
}
function getGanFromZhi(yearGan, targetZhi){
  const startGan = getYearGanMonthStart(yearGan);
  const startIdx = TG.indexOf(startGan);
  const zhiIdx = FINE_DZ_ORDER.indexOf(targetZhi);
  if(zhiIdx<0) return '?';
  return TG[(startIdx+zhiIdx)%10];
}
function getTaiYuan(monthGan, monthZhi){
  const mgIdx = TG.indexOf(monthGan);
  const mzIdx = DZ.indexOf(monthZhi);
  if(mgIdx<0||mzIdx<0) return {g:'?',z:'?'};
  return {g:TG[(mgIdx+1)%10], z:DZ[(mzIdx+3)%12]};
}
function getMingGong(yearGan, monthZhi, hourZhi){
  const mIdx = FINE_DZ_ORDER.indexOf(monthZhi);
  let hIdx = DZ.indexOf(hourZhi);
  // 时支转寅起序：子=0.. 先转为寅起
  // 子时对应 丑-1? 简化：用FINE_DZ_ORDER 索引对应
  let hIdxTiger = FINE_DZ_ORDER.indexOf(hourZhi);
  if(hIdxTiger<0){
    // 子丑映射
    if(hourZhi==='子') hIdxTiger = 10;
    else if(hourZhi==='丑') hIdxTiger = 11;
    else hIdxTiger = 0;
  }
  if(mIdx<0) return {g:'?',z:'?'};
  let mingIdx = 14 - (mIdx+1) - (hIdxTiger+1);
  while(mingIdx<=0) mingIdx+=12;
  while(mingIdx>12) mingIdx-=12;
  const mingZhi = FINE_DZ_ORDER[mingIdx-1];
  const mingGan = getGanFromZhi(yearGan, mingZhi);
  return {g:mingGan, z:mingZhi};
}
function getShenGong(monthZhi, hourZhi){
  let mIdx = FINE_DZ_ORDER.indexOf(monthZhi);
  let hIdx = FINE_DZ_ORDER.indexOf(hourZhi);
  if(mIdx<0) mIdx=0;
  if(hIdx<0){
    if(hourZhi==='子') hIdx=10;
    else if(hourZhi==='丑') hIdx=11;
    else hIdx=0;
  }
  let shenIdx = (mIdx+1)+(hIdx+1);
  if(shenIdx>12) shenIdx = shenIdx%12 || 12;
  const shenZhi = FINE_DZ_ORDER[shenIdx-1];
  return {g:'?', z:shenZhi};
}
const CHANGSHENG_NAMES = ['长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝','胎','养'];
function getChangShengName(riGan, zhi){
  const startMap = {甲:11,乙:6,丙:2,丁:9,戊:2,己:9,庚:5,辛:0,壬:8,癸:3};
  const dzIdx = {子:0,丑:1,寅:2,卯:3,辰:4,巳:5,午:6,未:7,申:8,酉:9,戌:10,亥:11};
  const start = startMap[riGan];
  const idx = dzIdx[zhi];
  if(start===undefined||idx===undefined) return '-';
  const yang = {甲:1,丙:1,戊:1,庚:1,壬:1}[riGan] ? 1 : -1;
  let step;
  if(yang===1) step = (idx - start + 12)%12;
  else step = (start - idx + 12)%12;
  return CHANGSHENG_NAMES[step]||'-';
}

function getCharWX(ch){
  for(const w in NAMING_DICT){
    if(NAMING_DICT[w].chars.includes(ch)) return w;
  }
  return null;
}
function calcNamingScore(fullName, surWX, yongShen){
  const chars = fullName.slice(1).split('');
  let score = 70;
  let wxMatch = 0;
  chars.forEach(c=>{
    const w = getCharWX(c);
    if(!w) return;
    if(w===yongShen) {score+=10; wxMatch+=1;}
    else if({木:{火:1},火:{土:1},土:{金:1},金:{水:1},水:{木:1}}[w]&& {木:{火:1},火:{土:1},土:{金:1},金:{水:1},水:{木:1}}[w][yongShen]){score+=6;}
    else if(w===surWX){score+=2;}
    // 克制忌神
    const ji = {木:'金',火:'水',土:'木',金:'火',水:'土'};
    // bonus
  });
  // 长度
  if(chars.length===2) score+=3;
  // 音律 (简单：避免同声调)
  score = Math.min(98, Math.max(52, score));
  return {score, wxMatch};
}
function generateNamingList(surname, gender, yongShen, style, limit){
  surname = (surname||'').trim()||'李';
  gender = gender||'male';
  yongShen = yongShen||'木';
  style = style||'现代';
  limit = limit||12;
  const genderBias = gender==='female' ? ['薇','芷','芸','茵','涵','涵','昕','晴','怡','琪','琳','珊','妍','娜','萱','汐','沁','若','语','诗'] : ['浩','泽','煜','峻','铭','睿','凯','瑞','霖','航','宇','辰','轩','睿','博','硕','峥','尧','翰','帆'];
  const yPool = NAMING_DICT[yongShen]?NAMING_DICT[yongShen].chars:[];
  const shengMap = {木:'火',火:'土',土:'金',金:'水',水:'木'};
  const shengPool = NAMING_DICT[shengMap[yongShen]] ? NAMING_DICT[shengMap[yongShen]].chars : [];
  const allPool = [...yPool, ...shengPool, ...genderBias];
  // 去重
  const uniq = [...new Set(allPool)];
  // 风格调整
  let pool2 = uniq;
  if(style==='古风'){
    pool2 = uniq.filter(c=>['梓','楠','珩','珞','珺','瑾','瑜','璟','翊','翎','晏','岚','清','澈','疏','萧','云','溪','沐','霖'].includes(c) || Math.random()>0.5);
    if(pool2.length<20) pool2 = uniq;
  }else if(style==='诗经'){
    const shiPool = ['攸','宁','蓁','薇','蓁','采','芑','苓','菁','霏','霏','如','英','穆','清','德','尚','令','燕','婉'];
    pool2 = [...shiPool, ...yPool].slice(0,30);
  }
  const result = [];
  const used = new Set();
  for(let i=0;i<200 && result.length<limit;i++){
    const c1 = pool2[Math.floor(Math.random()*pool2.length)];
    const c2 = pool2[Math.floor(Math.random()*pool2.length)];
    if(!c1||!c2) continue;
    if(c1===c2) continue;
    const name = surname + c1 + c2;
    if(used.has(name)) continue;
    used.add(name);
    const full2 = surname + c1;
    const scoreObj1 = calcNamingScore(name, SURNAME_WX[surname]||null, yongShen);
    const scoreObj2 = calcNamingScore(full2, SURNAME_WX[surname]||null, yongShen);
    // 70% 双字, 30% 单字
    const finalName = (result.length%3===0 && Math.random()>0.5) ? full2 : name;
    const scoreObj = finalName.length===surname.length+1 ? scoreObj2 : scoreObj1;
    result.push({name:finalName, chars:finalName.slice(surname.length).split(''), score:scoreObj.score, wxMatch:scoreObj.wxMatch, isDouble:finalName.length===surname.length+2});
  }
  result.sort((a,b)=>b.score-a.score);
  return result;
}

  if(!list.length) return '<div class="layoff-disclaimer">未生成结果，请调整条件</div>';
  return `<div class="naming-grid">${list.map(item=>{

    const meaning = item.chars.map(c=>NAMING_MEANING[c]||`${c}字寓意美好`).join('；');
    return `<div class="naming-card">
      <div class="naming-card-top"><div class="naming-name">${item.name}</div><div class="naming-score">${item.score}分</div></div>

function getGujiForContext(ctx){
  const list=[];
  for(const bookKey in GUJI_DATA){
    const book = GUJI_DATA[bookKey];
    book.passages.forEach(p=>{
      try{
        if(!p.relevance || p.relevance(ctx)){
          list.push(Object.assign({bookKey, bookName:book.name}, p));
        }
      }catch(e){}
    });
  }
  return list;
}
function searchGuji(keyword, bookFilter){
  keyword = (keyword||'').trim();
  const res=[];
  for(const bk in GUJI_DATA){
    if(bookFilter && bookFilter!=='all' && bk!==bookFilter) continue;
    const book = GUJI_DATA[bk];
    book.passages.forEach(p=>{
      if(!keyword || p.content.includes(keyword) || p.title.includes(keyword) || (p.keys&&p.keys.join('').includes(keyword)) || p.trans.includes(keyword)){
        res.push(Object.assign({bookKey:bk, bookName:book.name}, p));
      }
    });
  }
  return res;
}

function explainGuji(id){

  if(!item) return;
  const q='请结合我的命盘，解读《'+item.bookName+'》中「'+item.title+'」这句：『'+item.content+'』，白话意思是「'+item.trans+'」，对我当前大运流年有什么具体指导？';

function calcQian(){
  const qTypeEl = document.querySelector('.qian-type.active');
