"],rel:["藏干","透干","得地"]},{t:"纳音",d:"六十甲子各自对应的传统五行名称，如海中金、炉中火。",p:"纳音属于另一套象意分类，不宜替代四柱整体旺衰与生克分析。",see:["bazi"],rel:["六十甲子","年柱"]},{t:"六十甲子",d:"十天干与十二地支依次组合形成的六十组干支循环。",p:"年、月、日、时以及大运、流年都可用六十甲子表示。",see:["bazi","timeline"],rel:["天干","地支","大运","流年"]},{t:"节气",d:"太阳运行形成的二十四个时间节点，八字常以“节”来划分月份。",p:"年柱通常以立春为界，月柱以立春、惊蛰、清明等十二节为界。",see:["bazi","liuyue"],rel:["月令","立春","真太阳时"]},{t:"立春",d:"二十四节气之一，八字排年、排寅月的重要分界点。",p:"立春前后出生时，需要按具体交节时刻判断年柱和月柱，不能只看公历日期。",see:["bazi"],rel:["节气","年柱","月柱"]},{t:"十神",d:"其他天干与日主之间的十类关系，是命理里的“角色标签”。",p:"按五行生克和阴阳同异分为比肩、劫财、食神、伤官、正财、偏财、正官、七杀、正印、偏印。",see:["bazi","dayun"],rel:["比肩","劫财","食神","伤官","正财","偏财","正官","七杀","正印","偏印"]},{t:"比肩",d:"与日主五行相同、阴阳也相同，常被理解为同类、自主与并肩。",p:"比肩可象征自我、同辈、合作或竞争；是否有利取决于日主旺衰和组合。",see:["bazi"],rel:["劫财","比劫","十神"]},{t:"劫财",d:"与日主五行相同、阴阳不同，常对应竞争、分享与资源分流。",p:"劫财并非必然破财，也可表现为行动力、人脉和敢于争取。",see:["bazi","risk"],rel:["比肩","比劫","十神"]},{t:"食神",d:"由日主所生且阴阳相同，常对应稳定输出、才艺、享受与照顾。",p:"传统上重视“食神制杀”“食神生财”等组合；单独出现不能直接判吉凶。",see:["bazi","persona"],rel:["伤官","食伤","十神"]},{t:"伤官",d:"由日主所生且阴阳不同，常对应表达、突破、质疑规则与创造力。",p:"伤官可以是才华与改革，也可能表现为表达过锐；需结合正官、印星等关系。",see:["bazi","persona"],rel:["食神","食伤","伤官见官"]},{t:"正财",d:"日主所克且阴阳不同，常对应稳定收入、责任感与可管理资源。",p:"传统男命也常以正财象征配偶，但现代解读不宜把它等同于单一事件。",see:["bazi","trend"],rel:["偏财","财星","十神"]},{t:"偏财",d:"日主所克且阴阳相同，常对应机会型资源、项目收入和资源整合。",p:"偏财不等于投机必赚；是否能承受机会与波动仍要看整体结构。",see:["bazi","trend"],rel:["正财","财星","十神"]},{t:"正官",d:"克制日主且阴阳不同，常对应规则、责任、职位与正式评价。",p:"正官可表现为秩序和职业身份，也可能带来约束；喜忌取决于日主承载力与组合。",see:["bazi","trend"],rel:["七杀","官杀","十神"]},{t:"七杀",a:["偏官"],d:"克制日主且阴阳相同，常对应压力、竞争、执行力与挑战。",p:"七杀不是简单的“凶星”；有制化时可转为决断和权责，无制化时压力感更明显。",see:["bazi","risk"],rel:["正官","官杀","食神制杀"]},{t:"正印",d:"生日主且阴阳不同，常对应学习、支持、资质、保护与系统知识。",p:"正印可代表稳定的支持系统；过多时也可能表现为依赖、保守或行动变慢。",see:["bazi","persona"],rel:["偏印","印星","十神"]},{t:"偏印",a:["枭神"],d:"生日主且阴阳相同，常对应非标准学习、洞察、独立研究与敏感度。",p:"偏印也称枭神；其表现可能是独特专长，也可能是想得多、落地少。",see:["bazi","persona"],rel:["正印","印星","枭神夺食"]},{t:"比劫",d:"比肩与劫财的合称，代表与日主同类的力量。",p:"身弱时比劫常被视作支持，身旺时过多也可能形成竞争或资源分流。",see:["bazi","wuxing"],rel:["比肩","劫财","身旺","身弱"]},{t:"食伤",d:"食神与伤官的合称，代表日主向外输出的力量。",p:"常用于观察表达、创造、产品、技能输出；对身弱者也可能形成过度消耗。",see:["bazi","persona"],rel:["食神","伤官","泄秀"]},{t:"财星",d:"正财与偏财的合称，代表日主可以管理和支配的资源。",p:"财星不等同实际财富多少，还需看日主能否承载、财星是否有源及岁运配合。",see:["bazi","trend"],rel:["正财","偏财","身旺","身弱"]},{t:"官杀",a:["官星"],d:"正官与七杀的合称，代表规则、责任、压力与权力关系。",p:"官杀是否有利要看日主强弱、是否有印化或食伤制衡。",see:["bazi","trend"],rel:["正官","七杀","杀印相生"]},{t:"印星",a:["印枭"],d:"正印与偏印的合称，代表支持、学习、保护和吸收。",p:"印星能生日主，也可能克制食伤；具体效果需要结合数量和位置。",see:["bazi","persona"],rel:["正印","偏印","食伤"]},{t:"伤官见官",d:"命局或岁运中，伤官与正官同时形成明显作用。",p:"传统上关注表达突破与规则权威之间的冲突；有印、财等通关时表现会不同。",see:["risk","trend"],rel:["伤官","正官","通关"]},{t:"食神制杀",d:"用食神的输出与智慧去制衡七杀的压力。",p:"是否成立要看食神、七杀和日主都有相应力量，不能只因两者同时出现就认定。",see:["bazi"],rel:["食神","七杀","格局"]},{t:"杀印相生",d:"七杀生印、印再生日主，形成压力转化为能力与资质的链条。",p:"传统上要求杀、印、身之间流通有情，且少受严重破坏。",see:["bazi"],rel:["七杀","印星","通关"]},{t:"枭神夺食",d:"偏印对食神形成明显克制的传统说法。",p:"常用来描述吸收与输出之间失衡；是否成立需看双方力量及是否有财星调节。",see:["bazi","risk"],rel:["偏印","食神","财星"]},{t:"旺衰",a:["强弱"],d:"衡量日主在季节、根基和同类支持下，是偏强、偏弱还是较平衡。",p:"通常综合得令、得地、得势及合冲制化判断，不应只按五行数量计算。",see:["wuxing","persona"],rel:["身旺","身弱","得令","得地","得势"]},{t:"身旺",a:["身强"],d:"日主获得的季节、根基和支持相对较多。",p:"身旺不等于命好，通常更需要观察如何泄、耗、制以保持平衡。",see:["persona","trend"],rel:["身弱","旺衰","用神"]},{t:"身弱",d:"日主获得的季节、根基和支持相对不足。",p:"身弱不等于命差，通常更关注印星、比劫等生扶以及现实资源支持。",see:["persona","trend"],rel:["身旺","旺衰","用神"]},{t:"得令",d:"日主在出生季节中获得支持，像植物生在适合自己的时节。",p:"主要看日主五行在月令中的旺相休囚死状态，是旺衰判断的重要维度。",see:["wuxing"],rel:["月令","得地","得势"]},{t:"得地",d:"日主在四个地支中有根、有同类或得到生扶。",p:"常结合藏干、通根、禄旺墓库及地支位置权重判断。",see:["bazi","wuxing"],rel:["通根","藏干","得令","得势"]},{t:"得势",d:"日主在天干和整体组合中得到同类或生扶，形成协同力量。",p:"除天干数量外，还会考虑位置远近、生克链条与是否受制。",see:["bazi","wuxing"],rel:["得令","得地","旺衰"]},{t:"旺相休囚死",d:"传统上描述五行在不同季节中的五种状态。",p:"当令者为旺，受其所生者为相，生当令者为休，克当令者为囚，被当令者所克为死。",see:["wuxing"],rel:["月令","得令","旺衰"]},{t:"用神",d:"为了让命盘结构更协调，分析时优先借助的五行方向。",p:"用神可从扶抑、调候、通关、病药等角度选取，不等于“缺什么就补什么”。",see:["wuxing","timeline"],rel:["喜神","忌神","扶抑","调候","通关"]},{t:"喜神",d:"能帮助用神、对整体协调有辅助作用的五行。",p:"喜神通常次于主用神，实际取法会因流派和命局结构而异。",see:["wuxing"],rel:["用神","忌神"]},{t:"忌神",d:"在当前分析框架下，容易加重失衡的五行方向。",p:"忌神不代表对应的人事物永远不好；岁运组合和现实选择会改变具体表现。",see:["wuxing","risk"],rel:["用神","喜神"]},{t:"扶抑",d:"日主偏弱就扶助，偏旺就泄耗或制约，让整体趋于平衡。",p:"扶抑取用是常见方法之一，但极端格局或调候需求可能优先于简单强弱。",see:["wuxing"],rel:["身旺","身弱","用神"]},{t:"调候",d:"根据寒、暖、燥、湿调整命盘气候，就像先处理温度和水分。",p:"调候常参考日主与月令组合，重视季节急需的天干，并不完全等同扶抑用神。",see:["wuxing"],rel:["月令","用神","穷通宝鉴"]},{t:"通关",d:"在两种冲突力量之间加入能量桥梁，让关系由克转生。",p:"例如木土交战时用火承接木生火、火生土；是否有效仍要看中间五行是否有力。",see:["wuxing"],rel:["相生","相克","用神"]},{t:"泄秀",d:"日主有力时，通过食神或伤官把能量转成表达、技能和作品。",p:"传统上常用于描述身旺而食伤有力、输出顺畅的结构。",see:["persona"],rel:["食神","伤官","身旺"]},{t:"格局",d:"根据月令、透干和整体结构，为命盘提炼出的主要组织方式。",p:"格局是分析框架，不是高低标签；是否成立还要看清纯、护卫与是否被破坏。",see:["bazi"],rel:["月令","透干","用神"]},{t:"正官格",d:"以月令正官为核心建立的格局。",p:"传统上重视官星清纯、有财印配合并避免严重伤官破坏。",see:["bazi"],rel:["正官","格局","伤官见官"]},{t:"七杀格",a:["偏官格"],d:"以月令七杀为核心建立的格局。",p:"通常关注七杀是否有制、有化或日主能否承载。",see:["bazi"],rel:["七杀","食神制杀","杀印相生"]},{t:"食神格",d:"以月令食神为核心建立的格局。",p:"常关注食神是否有力、能否生财或制杀，以及是否被偏印强力克制。",see:["bazi"],rel:["食神","食神制杀","枭神夺食"]},{t:"伤官格",d:"以月令伤官为核心建立的格局。",p:"重视表达和突破能力，也需观察与官星、印星、财星的配合。",see:["bazi"],rel:["伤官","伤官见官","格局"]},{t:"财格",a:["正财格","偏财格"],d:"以月令财星为核心建立的格局。",p:"传统上关注财星是否有源、日主能否承载，以及官印食伤的配合。",see:["bazi"],rel:["财星","正财","偏财"]},{t:"印格",a:["正印格","偏印格","印绶格"],d:"以月令印星为核心建立的格局。",p:"常关注印星是否清纯、日主是否受益，以及食伤财星对结构的影响。",see:["bazi"],rel:["印星","正印","偏印"]},{t:"建禄格",d:"月令处在日主的临官禄地，日主通常根气较足。",p:"建禄格不能只凭月支确定喜忌，仍需看全局财官食伤与比劫配置。",see:["bazi"],rel:["格局","身旺","月令"]},{t:"月刃格",a:["羊刃格"],d:"月令处在日主的刃地，通常表现为日主力量集中。",p:"传统上常重视官杀制刃与食伤泄秀；具体判法有流派差异。",see:["bazi"],rel:["羊刃","格局","官杀"]},{t:"从格",a:["从财格","从官格","从杀格","从儿格"],d:"日主极弱且难以自立时，顺从命局中最强的一方来取用。",p:"从格条件严格，若日主仍有明显根气或生扶，通常不能轻易判从。",see:["bazi","wuxing"],rel:["身弱","格局","用神"]},{t:"大运",a:["十年运"],d:"按出生信息排出的长期阶段，每一步通常覆盖约十年。",p:"由月柱顺排或逆排，并根据出生到相邻节气的时间换算起运岁数。",see:["dayun","timeline"],rel:["起运","流年","流月"]},{t:"起运",a:["起运岁数"],d:"从出生到进入第一步大运之间的换算年龄。",p:"常以出生时刻至前一个或后一个“节”的时间，按三天折一年等规则换算。",see:["dayun","timeline"],rel:["大运","节气","顺排","逆排"]},{t:"顺排",d:"大运从月柱开始按干支顺序向后排列。",p:"常见规则按出生年干阴阳与性别决定顺逆，不同流派可能采用不同口径。",see:["dayun"],rel:["逆排","大运","起运"]},{t:"逆排",d:"大运从月柱开始按干支顺序向前排列。",p:"常见规则按出生年干阴阳与性别决定顺逆，不同流派可能采用不同口径。",see:["dayun"],rel:["顺排","大运","起运"]},{t:"流年",d:"某一公历年份对应的干支，用来观察当年的阶段主题。",p:"流年应与原局、大运共同分析，不能脱离大运单独作绝对判断。",see:["trend","liuyue"],rel:["大运","流月","太岁"]},{t:"流月",d:"流年中的月度干支，用来细分每个月的节奏。",p:"流月通常以节气交接，不等同公历每月一日或农历初一。",see:["liuyue","monthly"],rel:["流年","节气","月令"]},{t:"本命年",d:"流年地支与出生年支相同的年份。",p:"本命年常被视为某些主题被放大，并不自动等于不吉。",see:["timeline","trend"],rel:["太岁","伏吟","流年"]},{t:"太岁",d:"当年流年的地支及其象征性称呼。",p:"合、冲、刑、害太岁是传统岁运关系描述，不应直接等同具体事件。",see:["trend","risk"],rel:["流年","本命年","冲太岁"]},{t:"冲太岁",d:"出生年支与流年地支构成六冲。",p:"传统上多解释为变化和不稳定性增加；变化也可能是主动调整而非单纯坏事。",see:["risk","trend"],rel:["太岁","六冲","流年"]},{t:"岁运并临",d:"流年干支与当前大运干支完全相同。",p:"传统上认为同一信号叠加、阶段主题更集中，但吉凶仍取决于该干支对原局的作用。",see:["dayun","trend"],rel:["大运","流年","伏吟"]},{t:"伏吟",d:"相同的干支或地支重复出现，表示同类主题被重复强调。",p:"伏吟常对应重复、停滞或感受加深，也可能是同一事情持续推进，不能一概论凶。",see:["bazi","risk"],rel:["反吟","岁运并临","本命年"]},{t:"反吟",d:"两组干支形成明显天克地冲，表示对立与变化加大。",p:"传统上与伏吟相对使用；是否构成以及影响大小需结合具体柱位和喜忌。",see:["bazi","risk"],rel:["伏吟","六冲","相克"]},{t:"天干五合",a:["天干合"],d:"甲己、乙庚、丙辛、丁壬、戊癸五组天干相合。",p:"相合不一定化成新的五行；是否合化还需季节、位置和助力条件。",see:["bazi"],rel:["合化","六合","三合"]},{t:"合化",d:"两个或多个干支相合后，在条件充分时转向某种五行。",p:"“有合”不等于“化成”，通常要考虑月令、透干、位置和是否受阻。",see:["bazi","wuxing"],rel:["天干五合","六合","三合"]},{t:"六合",d:"十二地支两两相合的六组关系，如子丑合、寅亥合。",p:"六合可表示连接、牵绊或合作；能否合化及实际作用要看全局。",see:["bazi"],rel:["六冲","三合","合化"]},{t:"六冲",a:["地支冲"],d:"十二地支两两相冲的六组关系，如子午冲、寅申冲。",p:"六冲常代表移动、分离、调整或冲突，落在哪一柱会影响观察主题。",see:["bazi","risk"],rel:["六合","相刑","相害"]},{t:"三合",a:["三合局"],d:"三组地支共同形成一种五行倾向，如申子辰合水。",p:"三支齐全称全局；两支可称半合，但力量与成局条件不同。",see:["bazi","wuxing"],rel:["三会","六合","半合"]},{t:"半合",d:"三合局中只出现两支，形成部分呼应。",p:"是否有力通常看是否包含中神、月令支持及是否受冲破。",see:["bazi"],rel:["三合","合化"]},{t:"三会",a:["三会方"],d:"相邻三个季节地支汇成一方之气，如寅卯辰会木。",p:"三会通常强调季节同方力量，是否成化仍需看整体条件。",see:["bazi","wuxing"],rel:["三合","六合"]},{t:"相刑",a:["地支刑","三刑","自刑"],d:"地支之间的一类紧张关系，包括三刑、子卯刑和部分自刑。",p:"相刑常用来描述内在摩擦、反复或规则压力，但不能直接对应灾祸。",see:["bazi","risk"],rel:["六冲","相害","相破"]},{t:"相害",a:["地支害","六害"],d:"十二地支之间六组相害关系，偏向暗中不协调或牵制。",p:"相害的解释通常弱于直接
